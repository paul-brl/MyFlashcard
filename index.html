const dateKey = (d=new Date()) => d.toISOString().slice(0,10);
const getStats = u => { try { return JSON.parse(localStorage.getItem(`mx6-stats-${u}`)||"null")||{days:{},total:{cards:0,correct:0,seconds:0}}; } catch { return {days:{},total:{cards:0,correct:0,seconds:0}}; } };
const saveStats = (u,st) => { try { localStorage.setItem(`mx6-stats-${u}`,JSON.stringify(st)); } catch {} };
const recordStat = (username, correct, elapsedMs) => {
  if(!username)return;
  const st = getStats(username);
  const key = dateKey();
  const secs = Math.min(Math.round(elapsedMs/1000), 120); // cap 2 min/card
  if(!st.days[key]) st.days[key] = {cards:0,correct:0,seconds:0};
  st.days[key].cards++;
  if(correct) st.days[key].correct++;
  st.days[key].seconds += secs;
  st.total.cards++;
  if(correct) st.total.correct++;
  st.total.seconds += secs;
  saveStats(username, st);
};
const computeStreak = (days) => {
  let streak=0;
  const today=dateKey();
  const yesterday=dateKey(new Date(Date.now()-86400000));
  // Start from today if studied, else from yesterday (don't break streak before day ends)
  let cur=new Date(days[today]?.cards>0?today:yesterday);
  if(!days[dateKey(cur)]?.cards)return 0;
  while(true){const k=dateKey(cur);if(!days[k]?.cards)break;streak++;cur=new Date(cur.getTime()-86400000);}
  return streak;
};

};

// ─── SRS ─────────────────────────────────────────────────────────────────────
function computeNext(prev,rating,s=DEFAULT_SETTINGS){
  const {againMin=1,hardMin=5,goodMin=10,easyDays=4}=s;
  const {state="new",step=0,interval=1,ease=2.5,reps=0,lapses=0,lapseInt=1}=prev||{};
  const mf=m=>new Date(Date.now()+m*60000).toISOString();
  const df=d=>new Date(Date.now()+d*86400000).toISOString();
  const base={ease,reps,lapses,lapseInt};
  if(state==="new"||state==="learning"){
    if(rating===1)return{...base,state:"learning",step:0,interval:againMin,next:mf(againMin)};
    if(rating===2)return{...base,state:"learning",step:1,interval:hardMin,next:mf(hardMin)};
    if(rating===3){if(step>=2)return{...base,state:"review",step:0,interval:1,reps:1,lapseInt:0,next:df(1)};return{...base,state:"learning",step:2,interval:goodMin,next:mf(goodMin)};}
    return{...base,state:"review",step:0,interval:easyDays,reps:1,lapseInt:0,next:df(easyDays)};
  }
  if(state==="review"){
    if(rating===1){const li=Math.max(1,Math.round(interval*0.2));return{state:"relearning",step:0,interval,ease:Math.max(1.3,ease-0.2),reps,lapses:lapses+1,lapseInt:li,next:mf(againMin)};}
    let ni,ne=ease;
    if(rating===2){ni=Math.max(interval+1,Math.round(interval*1.2));ne=Math.max(1.3,ease-0.15);}
    else if(rating===3){ni=Math.max(interval+1,Math.round(interval*ease));}
    else{ni=Math.max(interval+1,Math.round(interval*ease*1.3));ne=Math.min(3.5,ease+0.15);}
    return{state:"review",step:0,interval:ni,ease:ne,reps:reps+1,lapses,lapseInt:0,next:df(ni)};
  }
  if(rating===1)return{...prev,next:mf(againMin)};
  const ni=Math.max(1,lapseInt);return{state:"review",step:0,interval:ni,ease,reps:reps+1,lapses,lapseInt:0,next:df(ni)};
}
function getIntervalLabel(prev,rating,s=DEFAULT_SETTINGS){
  const r=computeNext(prev,rating,s);
  if(r.state==="learning"||r.state==="relearning"){const m=Math.max(1,Math.round((new Date(r.next)-Date.now())/60000));return m<60?`${m} min`:`${Math.round(m/60)} h`;}
  const d=r.interval;if(d===1)return"1 jour";if(d<7)return`${d} j`;if(d<30)return`${Math.round(d/7)} sem.`;if(d<365)return`${Math.round(d/30)} mois`;return`${(d/365).toFixed(1)} an${d>=730?"s":""}`;
}
function isDue(p){return !p?.next||new Date(p.next)<=new Date();}
function isNew(p){return !p||p.state==="new";}
function stateLabel(p){if(!p||p.state==="new")return"Nouveau";if(p.state==="learning")return"Apprentissage";if(p.state==="relearning")return"Réapprentissage";return`Révision · J+${p.interval}`;}
function buildQueue(cardList,prog,settings){
  const {dailyGroups,dailyPackets,maxReviewsPerDay}=settings;
  return cardList.filter(c=>{const p=prog[c.id];if(!isDue(p))return false;if(isNew(p)){if(dailyGroups.length>0&&!dailyGroups.includes(c.groupId))return false;if(dailyPackets.length>0&&!dailyPackets.includes(c.packetId))return false;}return true;}).slice(0,maxReviewsPerDay);
}
function chapterStats(cards,prog,gid,num,chId,pkId){
  const l=cards.filter(c=>c.groupId===gid&&c.num===num&&c.chapterId===chId&&c.packetId===pkId);
  return{total:l.length,due:l.filter(c=>isDue(prog[c.id])).length};
}
function courseDueCount(cards,prog,gid,num){
  const chs=getChapters(gid,num);
  if(!chs.length)return 0;
  return chs.reduce((acc,_,i)=>acc+PACKETS.reduce((a2,pk)=>a2+chapterStats(cards,prog,gid,num,i+1,pk.id).due,0),0);
}
function globalDue(cards,prog,ids,settings,pkId=null){
  const el=cards.filter(c=>ids.includes(c.groupId)&&(!pkId||c.packetId===pkId));
  return buildQueue(el,prog,settings).length;
}

function MultiToggle({label,options,value,onChange,colorFn}){
  const isAll=value.length===0,toggle=v=>onChange(value.includes(v)?value.filter(x=>x!==v):[...value,v]);

  return <div><Lbl>{label}</Lbl><div style={{display:"flex",flexWrap:"wrap",gap:8}}><TBtn active={isAll} onClick={()=>onChange([])} label="Tout" color={C.accent} bg={C.accentBg}/>{options.map(o=>{const col=colorFn?colorFn(o.value):C.accent,bg2=col===C.prio?C.prioBg:col===C.imp?C.impBg:col===C.util?C.utilBg:C.accentBg;return<TBtn key={o.value} active={value.includes(o.value)} onClick={()=>toggle(o.value)} label={o.label} color={col} bg={bg2}/>;})}</div><p style={{fontSize:11,color:C.textLt,margin:"8px 0 0"}}>{isAll?"Toutes les options incluses":`${value.length} sélectionnée${value.length>1?"s":""}`}</p></div>;
}
function ClassSelector({label,options,value,onChange,columns="auto"}){
  return <div><Lbl>{label}</Lbl><div style={{display:"grid",gridTemplateColumns:columns==="auto"?"repeat(auto-fill,minmax(160px,1fr))":`repeat(${columns},1fr)`,gap:8,marginTop:8}}>{options.map(opt=>{const active=value===opt.value,col=opt.color||C.accent,bg=opt.bg||C.accentBg;return<button key={String(opt.value)} onClick={()=>onChange(opt.value)} style={{fontFamily:font,fontSize:12,fontWeight:active?600:400,padding:"10px 12px",cursor:"pointer",borderRadius:8,border:`2px solid ${active?col:C.border}`,background:active?bg:C.surface,color:active?col:C.textMed,textAlign:"left",lineHeight:1.4}} onMouseEnter={e=>{if(!active)e.currentTarget.style.borderColor=col;}} onMouseLeave={e=>{if(!active)e.currentTarget.style.borderColor=C.border;}}>{active&&<span style={{marginRight:6}}>✓</span>}{opt.label}</button>;})}</div></div>;
}

// ─── Mot de passe oublié ───────────────────────────────────────────────────────
function ForgotPasswordModal({onClose,accounts,onPasswordReset}){
  const [step,setStep]=useState(1),[email,setEmail]=useState(""),[code,setCode]=useState(""),[password,setPassword]=useState(""),[confirm,setConfirm]=useState("");
  const [error,setError]=useState(""),[sending,setSending]=useState(false),[saving,setSaving]=useState(false),[done,setDone]=useState(false),[cooldown,setCooldown]=useState(0);
  const cooldownRef=useRef(null);
  const handleSendCode=async()=>{setError("");if(!validateEmail(email)){setError("Adresse email invalide.");return;}const exists=accounts.find(a=>a.username===email.trim().toLowerCase());if(!exists){setError("Aucun compte trouvé avec cette adresse email.");return;}setSending(true);try{const r=await fetch(`${EDGE_URL}/send-verification`,{method:"POST",headers:{"Content-Type":"application/json","apikey":SUPA_KEY,"Authorization":`Bearer ${SUPA_KEY}`},body:JSON.stringify({email:email.trim().toLowerCase()})});if(!r.ok){const d=await r.json();throw new Error(d.error||"Erreur envoi");}setStep(2);startCooldown();}catch(e){setError(`Impossible d'envoyer le code : ${e.message}`);}finally{setSending(false);}};
  const startCooldown=()=>{setCooldown(60);clearInterval(cooldownRef.current);cooldownRef.current=setInterval(()=>{setCooldown(v=>{if(v<=1){clearInterval(cooldownRef.current);return 0;}return v-1;});},1000);};
  const handleReset=async()=>{setError("");if(code.trim().length!==6){setError("Le code doit contenir 6 chiffres.");return;}if(!validatePassword(password).ok){setError("Le mot de passe ne respecte pas les critères.");return;}if(password!==confirm){setError("Les mots de passe ne correspondent pas.");return;}setSaving(true);try{const valid=await supa.checkVerification(email.trim().toLowerCase(),code.trim());if(!valid){setError("Code invalide ou expiré. Demande un nouveau code.");setSaving(false);return;}const ok=await supa.updatePassword(email.trim().toLowerCase(),password);if(!ok){setError("Erreur lors de la mise à jour. Contacte le support.");setSaving(false);return;}onPasswordReset(email.trim().toLowerCase(),password);setDone(true);}catch(e){setError(`Erreur : ${e.message}`);}finally{setSaving(false);}};
  useEffect(()=>()=>clearInterval(cooldownRef.current),[]);
  return <Modal onClose={onClose} width={400}>
    {done?(<div style={{textAlign:"center"}}><p style={{fontSize:52,margin:"0 0 16px"}}>✓</p><p style={{fontFamily:serif,fontSize:20,margin:"0 0 8px"}}>Mot de passe modifié !</p><p style={{fontSize:13,color:C.textMed,margin:"0 0 24px",lineHeight:1.6}}>Tu peux maintenant te connecter avec ton nouveau mot de passe.</p><Btn fill full onClick={onClose}>Retour à la connexion →</Btn></div>):(
      <><p style={{fontFamily:serif,fontSize:20,margin:"0 0 4px"}}>Mot de passe oublié</p><p style={{fontSize:13,color:C.textMed,margin:"0 0 20px",lineHeight:1.6}}>{step===1?"Saisis ton adresse email pour recevoir un code de réinitialisation.":`Code envoyé à ${email}. Saisis le code et ton nouveau mot de passe.`}</p>
        <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8,marginBottom:22}}>{[1,2].map(s=><React.Fragment key={s}><div style={{width:24,height:24,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",background:step>=s?C.accent:C.border,color:step>=s?"#fff":C.textLt,fontSize:11,fontWeight:600}}>{step>s?"✓":s}</div>{s<2&&<div style={{width:32,height:2,background:step>1?C.accent:C.border}}/>}</React.Fragment>)}</div>
        {step===1&&(<div><Lbl>Adresse email</Lbl><input style={iLine} type="email" placeholder="votre@email.com" value={email} onChange={e=>setEmail(e.target.value)} onKeyDown={e=>e.key==="Enter"&&handleSendCode()} autoFocus/>{error&&<p style={{fontSize:12,color:C.again,margin:"12px 0 0",background:C.againBg,padding:"8px 12px",borderRadius:6}}>{error}</p>}<Btn fill full style={{marginTop:20,fontSize:14,padding:"12px"}} onClick={handleSendCode} disabled={sending}>{sending?<><span style={{display:"inline-block",animation:"spin 0.8s linear infinite"}}>↻</span> Envoi…</>:"Envoyer le code →"}</Btn></div>)}
        {step===2&&(<div style={{display:"flex",flexDirection:"column",gap:16}}><div><Lbl>Code de vérification</Lbl><input style={{...iLine,fontSize:28,fontWeight:700,letterSpacing:10,textAlign:"center",fontFamily:mono,borderBottom:`2px solid ${C.accent}`}} type="text" inputMode="numeric" maxLength={6} placeholder="000000" value={code} onChange={e=>setCode(e.target.value.replace(/\D/g,""))} autoFocus/><p style={{fontSize:11,color:C.textLt,margin:"6px 0 0",textAlign:"center"}}>Vérifie tes spams · expire dans 10 min</p></div><div><PasswordField label="Nouveau mot de passe" value={password} onChange={e=>setPassword(e.target.value)}/><PasswordStrength password={password}/></div><PasswordField label="Confirmer le mot de passe" value={confirm} onChange={e=>setConfirm(e.target.value)} onKeyDown={e=>e.key==="Enter"&&handleReset()}/>{error&&<p style={{fontSize:12,color:C.again,background:C.againBg,padding:"8px 12px",borderRadius:6,margin:0}}>{error}</p>}<Btn fill full style={{fontSize:14,padding:"12px"}} onClick={handleReset} disabled={saving||code.length!==6}>{saving?<><span style={{display:"inline-block",animation:"spin 0.8s linear infinite"}}>↻</span> Réinitialisation…</>:"Réinitialiser le mot de passe →"}</Btn><div style={{display:"flex",justifyContent:"center",gap:16}}><button onClick={()=>{setStep(1);setCode("");setError("");}} style={{fontFamily:font,fontSize:12,background:"none",border:"none",cursor:"pointer",color:C.textLt,textDecoration:"underline"}}>← Modifier l'email</button><button onClick={()=>{if(cooldown>0)return;handleSendCode();}} disabled={cooldown>0||sending} style={{fontFamily:font,fontSize:12,background:"none",border:"none",cursor:cooldown>0?"not-allowed":"pointer",color:cooldown>0?C.textLt:C.accent,textDecoration:"underline",opacity:cooldown>0?0.6:1}}>{cooldown>0?`Renvoyer (${cooldown}s)`:"Renvoyer un code"}</button></div></div>)}
      </>
    )}
  </Modal>;
}

// ─── Occlusion ────────────────────────────────────────────────────────────────
const isOcclusion = (card) => { try { return JSON.parse(card.front)?.type==="occlusion"; } catch { return false; } };

function OcclusionCanvas({cardFront,showBack,showOthers}){
  const canvasRef=useRef(null);
  useEffect(()=>{
    try{
      const data=JSON.parse(cardFront);const canvas=canvasRef.current;if(!canvas)return;
      const ctx=canvas.getContext("2d");const img=new Image();
      img.onload=()=>{canvas.width=img.width;canvas.height=img.height;ctx.drawImage(img,0,0);
        data.zones.forEach((z,i)=>{
          const isTarget=z.id===data.targetZone;
          if(showBack){
            if(isTarget){
              // Zone cible révélée : contour vert, image visible en transparence légère
              ctx.strokeStyle="#15803d";ctx.lineWidth=3;ctx.strokeRect(z.x-1,z.y-1,z.w+2,z.h+2);
              ctx.fillStyle="#15803d22";ctx.fillRect(z.x,z.y,z.w,z.h);
            } else {
              // Autres zones : noir opaque avec numéro (masquées même après révélation)
              ctx.fillStyle="#000000";ctx.fillRect(z.x,z.y,z.w,z.h);
              ctx.fillStyle="white";ctx.font=`bold ${Math.min(z.h*0.45,18)}px sans-serif`;ctx.textAlign="center";ctx.textBaseline="middle";ctx.fillText(String(i+1),z.x+z.w/2,z.y+z.h/2);
            }
          } else {
            if(isTarget){
              // Zone à deviner : ROUGE opaque + "?"
              ctx.fillStyle="#dc2626";ctx.fillRect(z.x,z.y,z.w,z.h);
              ctx.strokeStyle="#991b1b";ctx.lineWidth=2;ctx.strokeRect(z.x,z.y,z.w,z.h);
              ctx.fillStyle="white";const fs=Math.min(z.h*0.5,30);ctx.font=`bold ${fs}px sans-serif`;ctx.textAlign="center";ctx.textBaseline="middle";ctx.fillText("?",z.x+z.w/2,z.y+z.h/2);
            } else if(!showOthers){
              // Autres zones (indices masqués) : NOIR opaque + numéro
              ctx.fillStyle="#000000";ctx.fillRect(z.x,z.y,z.w,z.h);
              ctx.strokeStyle="#222222";ctx.lineWidth=1;ctx.strokeRect(z.x,z.y,z.w,z.h);
              ctx.fillStyle="white";ctx.font=`bold ${Math.min(z.h*0.45,18)}px sans-serif`;ctx.textAlign="center";ctx.textBaseline="middle";ctx.fillText(String(i+1),z.x+z.w/2,z.y+z.h/2);
            }
            // showOthers=true : autres zones non dessinées → image visible (mode "voir les indices")
          }
        });
      };img.src=data.image;
    }catch(e){console.error("OcclusionCanvas:",e);}
  },[cardFront,showBack,showOthers]);
  return <canvas ref={canvasRef} style={{maxWidth:"100%",maxHeight:300,borderRadius:8,display:"block",margin:"0 auto"}}/>;
}

function ShopTab({userGroups,planId,username,cards,progress,settings,onStudy,onShowPacks}){
  const subjectPlans=PLANS.filter(p=>p.id.startsWith("g-"));
  const sem1Plans=subjectPlans.filter(p=>["g-cell-bio","g-histo","g-biochem","g-biomol","g-biophys","g-biostat"].includes(p.id));
  const sem2Plans=subjectPlans.filter(p=>["g-anatomie","g-physio","g-medic","g-ssh"].includes(p.id));

  const isIncluded=(plan)=>{
    if(planId==="both")return true;
    if(planId==="sem1"&&["g-cell-bio","g-histo","g-biochem","g-biomol","g-biophys","g-biostat"].includes(plan.id))return true;
    if(planId==="sem2"&&["g-anatomie","g-physio","g-medic","g-ssh"].includes(plan.id))return true;
    return plan.groups.every(gid=>userGroups.includes(gid));
  };

  // Study block for a purchased subject
  function PurchasedBlock({plan}){
    const [open,setOpen]=useState(false);
    const [activeCours,setActiveCours]=useState(null);
    const group=GROUPS.find(g=>g.id===plan.groups[0]);
    if(!group)return null;
    const chapters=activeCours?getChapters(group.id,activeCours):[];
    const totalDue=group.nums.reduce((acc,n)=>acc+courseDueCount(cards,progress,group.id,n),0);

    function PktBtn({chapterId,pk}){
      const col=pC(pk.id),bg=pB(pk.id);
      const {total,due}=chapterStats(cards,progress,group.id,activeCours,chapterId,pk.id);
      const hasDue=due>0,upToDate=total>0&&!hasDue;

          </div>
          <button onClick={()=>{setOpen(o=>!o);setActiveCours(null);}} style={{fontFamily:font,fontSize:12,fontWeight:600,padding:"8px 16px",cursor:"pointer",borderRadius:6,border:`1.5px solid ${C.good}`,background:open?"#d1fae5":C.good,color:open?C.good:"#fff",display:"flex",alignItems:"center",gap:6,whiteSpace:"nowrap",flexShrink:0,marginLeft:12}}>
            {open?"Fermer ▲":"Accéder au cours ▼"}

        {/* Expanded: course selector + chapters */}
        {open&&(
          <div style={{animation:"fadeIn 0.18s ease"}}>
            <div style={{display:"flex",gap:8,padding:"10px 18px",flexWrap:"wrap",borderBottom:activeCours?`1px solid ${C.border}`:"none",borderTop:`1px solid ${C.border}`,background:C.surface}}>
              {group.nums.map(n=>{const active=activeCours===n;const due=courseDueCount(cards,progress,group.id,n);return<button key={n} onClick={()=>setActiveCours(active?null:n)} style={{fontFamily:font,fontSize:12,fontWeight:active?600:400,padding:"8px 16px",cursor:"pointer",borderRadius:7,border:`1.5px solid ${active?C.accent:due>0?C.good:C.border}`,background:active?C.accentBg:due>0?C.goodBg:"transparent",color:active?C.accent:due>0?C.good:C.textMed,display:"flex",alignItems:"center",gap:7}}><span>Cours {n}</span>{due>0&&!active&&<span style={{fontFamily:mono,fontSize:8,fontWeight:700,padding:"1px 5px",borderRadius:10,background:C.good,color:"#fff"}}>{due}</span>}<span style={{fontSize:10,opacity:0.6}}>{active?"▲":"▼"}</span></button>;})}
            </div>
            {activeCours&&chapters.length>0&&chapters.map((chName,i)=>{const chIdx=i+1;const chDue=PACKETS.reduce((acc,pk)=>acc+chapterStats(cards,progress,group.id,activeCours,chIdx,pk.id).due,0);return<div key={chIdx} style={{display:"flex",alignItems:"center",padding:"9px 18px",gap:12,borderTop:`1px solid ${C.border}`,flexWrap:"wrap"}}><div style={{display:"flex",alignItems:"center",gap:8,flex:1,minWidth:180}}><span style={{fontFamily:mono,fontSize:9,letterSpacing:1,color:C.textLt,minWidth:18,flexShrink:0}}>{chIdx}</span><span style={{fontFamily:font,fontSize:13,color:chDue>0?C.text:C.textMed,fontWeight:chDue>0?500:400}}>{chName}</span>{chDue>0&&<span style={{fontFamily:mono,fontSize:8,fontWeight:700,padding:"1px 5px",borderRadius:10,background:C.accent,color:"#fff",flexShrink:0}}>{chDue}</span>}</div><div style={{display:"flex",gap:6,flexShrink:0}}>{PACKETS.map(pk=><PktBtn key={pk.id} chapterId={chIdx} pk={pk}/>)}</div></div>;})}
            {activeCours&&chapters.length===0&&<div style={{padding:"12px 18px"}}><p style={{fontSize:12,color:C.textLt,margin:0}}>Pas encore de chapitres définis pour ce cours.</p></div>}

  // Buy card for non-purchased subjects
  function BuyCard({plan}){

  const availableSem1=sem1Plans.filter(p=>!isIncluded(p));
  const purchasedSem2=sem2Plans.filter(p=>isIncluded(p));

      {/* Purchased subjects shown first with study access */}
      {(purchasedSem1.length>0||purchasedSem2.length>0)&&(
        <div style={{marginBottom:24}}>
          <p style={{fontFamily:mono,fontSize:9,letterSpacing:2,textTransform:"uppercase",color:C.good,margin:"0 0 10px"}}>✓ Mes matières débloquées</p>

          {purchasedSem2.map(plan=><PurchasedBlock key={plan.id} plan={plan}/>)}

      {/* Available subjects to buy */}
      {availableSem1.length>0&&(
        <div style={{marginBottom:24}}>
          <p style={{fontFamily:mono,fontSize:9,letterSpacing:2,textTransform:"uppercase",color:C.textLt,margin:"0 0 10px"}}>Semestre 1 — disponible à l'achat</p>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(200px,1fr))",gap:10}}>{availableSem1.map(plan=><BuyCard key={plan.id} plan={plan}/>)}</div>
        </div>
      )}
      {availableSem2.length>0&&(
        <div style={{marginBottom:24}}>
          <p style={{fontFamily:mono,fontSize:9,letterSpacing:2,textTransform:"uppercase",color:C.textLt,margin:"0 0 10px"}}>Semestre 2 — disponible à l'achat</p>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(200px,1fr))",gap:10}}>{availableSem2.map(plan=><BuyCard key={plan.id} plan={plan}/>)}</div>
        </div>

      <div style={{background:C.accentBg,border:`1px solid ${C.accent}20`,borderRadius:10,padding:"16px 20px",display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:12}}>
        <div><p style={{fontSize:13,color:C.accent,fontWeight:600,margin:"0 0 2px"}}>💡 Packs semestre — meilleur rapport qualité/prix</p><p style={{fontSize:12,color:C.textMed,margin:0}}>Sem. 1 complet à 99 € · Sem. 2 complet à 149 € · Année entière à 200 €</p></div>
        <button onClick={onShowPacks} style={{fontFamily:font,fontSize:12,fontWeight:600,padding:"9px 18px",cursor:"pointer",borderRadius:6,border:`1.5px solid ${C.accent}`,background:C.accent,color:"#fff",whiteSpace:"nowrap"}}>Voir les packs →</button>
      </div>
    </div>
  );
}

// ─── StatsTab ─────────────────────────────────────────────────────────────────
function StatsTab({username}){
  const stats=useMemo(()=>getStats(username),[username]);
  const today=dateKey();
  const todayCards=stats.days[today]?.cards||0;
  const todayCorrect=stats.days[today]?.correct||0;
  const streak=computeStreak(stats.days);
  const totalCards=stats.total.cards;
  const totalCorrect=stats.total.correct;
  const successRate=totalCards>0?Math.round(totalCorrect/totalCards*100):0;
  const totalSeconds=stats.total.seconds;

  // Flame display
  const flameCount=Math.min(streak,10);
  const flames=streak>0?"🔥".repeat(flameCount):"-";

  // Heatmap: last 26 weeks (182 days)
  const heatDays=useMemo(()=>{
    const days=[];
    for(let i=181;i>=0;i--){
      const d=new Date();d.setDate(d.getDate()-i);
      const k=dateKey(d);
      const n=stats.days[k]?.cards||0;
      days.push({date:k,n,label:`${d.toLocaleDateString("fr-FR",{weekday:"short",day:"numeric",month:"short"})}: ${n} carte${n!==1?"s":""}`});
    }
    return days;
  },[stats]);

  const heatColor=(n)=>{
    if(n===0)return"#e8e4dc";
    if(n<=2)return"#bbf7d0";
    if(n<=5)return"#4ade80";
    if(n<=15)return"#16a34a";
    return"#14532d";
  };

  // Group heatmap into weeks for grid display
  const weeks=useMemo(()=>{
    const ws=[];
    let week=[];
    heatDays.forEach((d,i)=>{
      week.push(d);
      if(week.length===7){ws.push(week);week=[];}
    });
    if(week.length)ws.push(week);
    return ws;
  },[heatDays]);

  // Month labels for heatmap
  const monthLabels=useMemo(()=>{
    const labels=[];
    let lastMonth=-1;
    weeks.forEach((week,wi)=>{
      const mid=week[Math.floor(week.length/2)];
      const m=new Date(mid.date).getMonth();
      if(m!==lastMonth){
        labels.push({wi,label:new Date(mid.date).toLocaleDateString("fr-FR",{month:"short"})});
        lastMonth=m;
      }
    });
    return labels;
  },[weeks]);

  const StatCard=({label,value,sub,accent})=>(
    <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:10,padding:"18px 16px"}}>
      <p style={{fontFamily:mono,fontSize:9,letterSpacing:2,textTransform:"uppercase",color:C.textLt,margin:"0 0 10px"}}>{label}</p>
      <p style={{fontFamily:serif,fontSize:30,fontWeight:400,margin:"0 0 4px",color:accent||C.text,lineHeight:1.1}}>{value}</p>
      {sub&&<p style={{fontSize:11,color:C.textMed,margin:0}}>{sub}</p>}
    </div>
  );

  return(
    <div style={{animation:"fadeIn 0.18s ease"}}>
      <p style={{fontFamily:serif,fontSize:18,margin:"0 0 4px"}}>Statistiques</p>
      <p style={{fontSize:13,color:C.textMed,margin:"0 0 22px"}}>Sauvegardées sur cet appareil · réinitialisées si tu vides le cache</p>

      {totalCards===0?(
        <div style={{border:`1.5px dashed ${C.border}`,borderRadius:12,padding:"48px 24px",textAlign:"center",background:C.surface}}>
          <p style={{fontSize:36,margin:"0 0 12px"}}>📊</p>
          <p style={{fontFamily:serif,fontSize:18,margin:"0 0 8px"}}>Aucune statistique pour l'instant</p>
          <p style={{fontSize:13,color:C.textMed,margin:0,lineHeight:1.6}}>Commence à réviser des flashcards pour voir tes stats !</p>
        </div>
      ):(
        <>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(150px,1fr))",gap:12,marginBottom:28}}>
            <StatCard label="Streak" value={`${streak} ${streak>0?"🔥":""}`} sub={`${streak===0?"Pas encore actif":streak===1?"1 jour d'affilée":streak+" jours d'affilée"}`} accent={streak>0?"#ea580c":C.text}/>
            <StatCard label="Aujourd'hui" value={todayCards} sub={todayCards>0?`${Math.round(todayCorrect/todayCards*100)}% de réussite`:"Pas encore révisé"} accent={todayCards>0?C.accent:C.text}/>
            <StatCard label="Total révisées" value={totalCards.toLocaleString("fr-FR")} sub="cartes au total"/>
            <StatCard label="Taux de réussite" value={`${successRate}%`} sub={`${totalCorrect} correctes / ${totalCards}`} accent={successRate>=80?C.good:successRate>=60?C.hard:C.again}/>
            <StatCard label="Temps total" value={formatSeconds(totalSeconds)} sub={`≈ ${Math.round(totalSeconds/totalCards)} s / carte`}/>
            <StatCard label="Jours actifs" value={Object.keys(stats.days).filter(k=>stats.days[k]?.cards>0).length} sub="jours de révision"/>
          </div>

          {/* Heatmap d'activité */}
          <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:10,padding:"20px"}}>
            <p style={{fontFamily:serif,fontSize:16,margin:"0 0 14px"}}>Activité (26 dernières semaines)</p>
            {/* Month labels */}
            <div style={{display:"flex",marginBottom:4,paddingLeft:20,position:"relative",height:16}}>
              {monthLabels.map(({wi,label})=>(
                <div key={wi} style={{position:"absolute",left:`${wi*(12+2)+20}px`,fontFamily:mono,fontSize:9,letterSpacing:1,color:C.textLt,textTransform:"uppercase"}}>{label}</div>
              ))}
            </div>
            {/* Grid: 7 rows × N weeks */}
            <div style={{display:"flex",gap:2}}>
              {/* Day labels */}
              <div style={{display:"flex",flexDirection:"column",gap:2,paddingTop:0,marginRight:4}}>
                {["L","M","M","J","V","S","D"].map((d,i)=>(
                  <div key={i} style={{width:12,height:12,fontFamily:mono,fontSize:8,color:C.textLt,display:"flex",alignItems:"center",justifyContent:"center"}}>{i%2===0?d:""}</div>
                ))}
              </div>
              {/* Week columns */}
              <div style={{display:"flex",gap:2,overflowX:"auto",paddingBottom:4}}>
                {weeks.map((week,wi)=>(
                  <div key={wi} style={{display:"flex",flexDirection:"column",gap:2}}>
                    {Array(7).fill(null).map((_,di)=>{
                      const day=week[di];
                      if(!day)return<div key={di} style={{width:12,height:12}}/>;
                      return(
                        <div key={di} title={day.label} style={{width:12,height:12,borderRadius:2,background:heatColor(day.n),cursor:"default",transition:"transform 0.1s"}}
                          onMouseEnter={e=>e.currentTarget.style.transform="scale(1.5)"}
                          onMouseLeave={e=>e.currentTarget.style.transform="none"}
                        />
                      );
                    })}
                  </div>
                ))}
              </div>
            </div>
            {/* Legend */}
            <div style={{display:"flex",alignItems:"center",gap:6,marginTop:12,justifyContent:"flex-end"}}>
              <span style={{fontFamily:mono,fontSize:9,color:C.textLt}}>Moins</span>
              {[0,2,5,15,20].map(n=><div key={n} style={{width:12,height:12,borderRadius:2,background:heatColor(n)}}/>)}
              <span style={{fontFamily:mono,fontSize:9,color:C.textLt}}>Plus</span>
            </div>
          </div>
        </>
      )}
    </div>
  );
}

// ─── MyCardsTab ──────────────────────────────────────────────────────────────
function MyCardsTab({userCards,onNew,onEdit,onDelete,onToggleIntegration,progress,onStudyUser}){

  // Groups that have at least one personal card
  const activeGroups=useMemo(()=>
    GROUPS.filter(g=>userCards.some(c=>c.groupId===g.id))
  ,[userCards]);

  const totalDue=userCards.filter(c=>isDue(progress[c.id])).length;
  const integratedCount=userCards.filter(c=>c.integrated).length;

  // GroupPanel: one per matière/group that has personal cards

    const [activeCours,setActiveCours]=useState(null);

        <span style={{fontSize:9}}>{pk.label}</span>
        <span style={{fontSize:9,fontWeight:400}}>{total===0?"vide":hasDue?`${due} carte${due>1?"s":""}`:upToDate?"✓ à jour":"vide"}</span>
      </button>;
    }

    return<div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:10,overflow:"hidden",marginBottom:12}}>
      {/* Header */}
      <div style={{padding:"11px 18px",borderBottom:`1px solid ${C.border}`,background:C.bg,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <p style={{fontFamily:serif,fontSize:15,margin:0}}>{group.label}</p>
          <Tag color={group.sem===1?C.accent:group.sem===2?C.imp:C.util} bg={group.sem===1?C.accentBg:group.sem===2?C.impBg:C.utilBg} small>{group.sem===0?"Pré-rentrée":group.sem===1?"Sem. 1":"Sem. 2"}</Tag>
          <Tag color={C.textMed} bg={C.bg} small>{groupCards.length} carte{groupCards.length>1?"s":""}</Tag>
        </div>
      </div>
      {/* Course tabs */}
      <div style={{display:"flex",gap:8,padding:"10px 18px",flexWrap:"wrap",borderBottom:activeCours?`1px solid ${C.border}`:"none",background:C.surface}}>
        {availNums.map(n=>{
          const active=activeCours===n;
          const due=groupCards.filter(c=>c.num===n&&isDue(progress[c.id])).length;
          return<button key={n} onClick={()=>{setActiveCours(active?null:n);setExpandedCh(null);}} style={{fontFamily:font,fontSize:12,fontWeight:active?600:400,padding:"8px 14px",cursor:"pointer",borderRadius:7,border:`1.5px solid ${active?"#7c3aed":due>0?C.good:C.border}`,background:active?"#ede9fe":due>0?C.goodBg:"transparent",color:active?"#7c3aed":due>0?C.good:C.textMed,display:"flex",alignItems:"center",gap:7}}>
            <span>Cours {n}</span>

          </button>;

                const isIntegrated=card.integrated;
                const dueCard=isDue(progress[card.id]);
                return<div key={card.id} style={{borderTop:`1px solid ${C.border}`,padding:"10px 18px 10px 46px",display:"flex",alignItems:"flex-start",gap:12}}>

                  <div style={{flex:1,minWidth:0}}>

                      {isIntegrated&&<Tag color={C.good} bg={C.goodBg} small>🔗 Intégré</Tag>}
                    </div>
                    {isOcclusion(card)?<p style={{fontFamily:serif,fontSize:13,color:C.textMed,margin:0}}>🖼 Image Occlusion</p>:<>
                      <p style={{fontFamily:serif,fontSize:13,color:C.text,margin:"0 0 2px",lineHeight:1.4}}>{card.front}</p>
                      <p style={{fontSize:11,color:C.textLt,margin:0,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{card.back}</p>
                    </>}
                  </div>
                  <div style={{display:"flex",gap:6,flexShrink:0,flexWrap:"wrap",justifyContent:"flex-end"}}>
                    <button onClick={()=>onToggleIntegration(card)} title={isIntegrated?"Retirer des onglets semestres":"Intégrer dans les onglets semestres"} style={{fontFamily:font,fontSize:11,fontWeight:500,padding:"5px 10px",cursor:"pointer",borderRadius:5,border:`1.5px solid ${isIntegrated?C.good:C.border}`,background:isIntegrated?C.goodBg:"transparent",color:isIntegrated?C.good:C.textMed,whiteSpace:"nowrap"}}>
                      {isIntegrated?"🔗 Intégré":"➕ Intégrer"}
                    </button>
                    <button onClick={()=>onEdit(card)} style={{fontFamily:font,fontSize:11,padding:"5px 8px",cursor:"pointer",borderRadius:5,border:`1px solid ${C.border}`,background:"transparent",color:C.textMed}}>✏</button>

                  </div>
                </div>;
              })}
            </div>}
          </div>;
        })}
      </div>}
    </div>;
  }

  return<div style={{animation:"fadeIn 0.18s ease"}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:20,flexWrap:"wrap",gap:12}}>
      <div>
        <p style={{fontFamily:serif,fontSize:18,margin:"0 0 4px"}}>Mes flashcards personnelles</p>
        <p style={{fontSize:13,color:C.textMed,margin:0,lineHeight:1.6}}>Privées · Synchronisées sur tous tes appareils · {userCards.length} carte{userCards.length!==1?"s":""}</p>
      </div>
      <Btn fill onClick={onNew} style={{flexShrink:0}}>+ Créer une carte</Btn>

    {integratedCount>0&&<div style={{background:C.goodBg,border:`1px solid ${C.good}25`,borderRadius:8,padding:"10px 14px",marginBottom:16,display:"flex",alignItems:"center",gap:8}}><span>🔗</span><p style={{fontSize:12,color:C.good,margin:0}}><strong>{integratedCount} carte{integratedCount>1?"s":""} intégrée{integratedCount>1?"s":""}</strong> — apparaissent dans les onglets Semestre 1/2 aux côtés des cartes officielles</p></div>}

    {userCards.length===0?<div style={{border:`1.5px dashed ${C.border}`,borderRadius:12,padding:"48px 24px",textAlign:"center",background:C.surface}}>

      {activeGroups.map(g=><GroupPanel key={g.id} group={g}/>)}
    </div>}

  </div>;
}

// ─── Dashboard ────────────────────────────────────────────────────────────────
function Dashboard({currentUser,cards,userCards,progress,settings,onStudy,onGlobalStudy,onAdmin,onSettings,onLogout,onNewUserCard,onEditUserCard,onDeleteUserCard,onToggleIntegration,onStudyUser,paymentStatus,onClosePaymentBanner}){

              const chIdx=i+1;
              const chDue=PACKETS.reduce((acc,pk)=>acc+chapterStats(allCards,progress,group.id,activeCours,chIdx,pk.id).due,0);
              const chTotal=PACKETS.reduce((acc,pk)=>acc+chapterStats(allCards,progress,group.id,activeCours,chIdx,pk.id).total,0);
              const userChCards=(userCards||[]).filter(c=>c.groupId===group.id&&c.num===activeCours&&c.chapterId===chIdx).length;
              return(
                <div key={chIdx} style={{display:"flex",alignItems:"center",padding:"9px 18px",gap:12,borderTop:`1px solid ${C.border}`,flexWrap:"wrap"}}>

                    <span style={{fontFamily:font,fontSize:13,color:chDue>0?C.text:C.textMed,fontWeight:chDue>0?500:400}}>{chName}</span>
                    {chDue>0&&<span style={{fontFamily:mono,fontSize:8,fontWeight:700,padding:"1px 5px",borderRadius:10,background:C.accent,color:"#fff",flexShrink:0}}>{chDue}</span>}
                    {userChCards>0&&<span style={{fontFamily:mono,fontSize:8,padding:"1px 5px",borderRadius:10,background:"#f0ece6",color:C.textMed,flexShrink:0}}>+{userChCards} perso</span>}
                  </div>
                  <div style={{display:"flex",gap:5,flexShrink:0,flexWrap:"wrap"}}>
                    {PACKETS.map(pk=><PktBtn key={pk.id} chapterId={chIdx} pk={pk}/>)}
                    {/* ── Tout (chapitre) : tous paquets combinés, SRS ── */}
                    {chTotal>0&&(()=>{
                      const hasDue=chDue>0;
                      const upToDate=chTotal>0&&!hasDue;
                      return(
                        <button onClick={()=>hasDue&&onStudy(group.id,activeCours,chIdx,"__all__")} style={{fontFamily:font,fontSize:11,fontWeight:500,padding:"6px 10px",cursor:hasDue?"pointer":"default",borderRadius:6,border:`1.5px solid ${hasDue?"#7c3aed":upToDate?C.border:"#e8e5e0"}`,background:hasDue?"#ede9fe":C.surface,color:hasDue?"#7c3aed":upToDate?C.textLt:"#c0bbb5",display:"flex",flexDirection:"column",alignItems:"center",gap:2,minWidth:64}} title="Tous paquets combinés (Prioritaire + Important + Utile)">
                          <span style={{fontSize:10,fontWeight:600}}>Tout</span>
                          <span style={{fontSize:10,fontWeight:400}}>{hasDue?`${chDue} carte${chDue>1?"s":""}`:upToDate?"✓ à jour":"vide"}</span>

        </div>
      )}
    </div>;
  }

  // tabHasAccess: safe for undefined (when activeTab="shop" or "mes-cartes")
  const tabHasAccess=hasTabAccess(TABS.find(t=>t.id===activeTab));

  return <div style={{fontFamily:font,background:C.bg,minHeight:"100vh",color:C.text,paddingTop:paymentStatus?56:0}}>
    <PaymentBanner status={paymentStatus} onClose={onClosePaymentBanner}/>
    <Nav left={<span style={{fontFamily:serif,fontSize:20}}>MyFlashcard</span>} center="Tableau de bord" right={<><Btn small onClick={onSettings}>Paramètres</Btn>{isAdmin&&<Btn small onClick={onAdmin}>Admin</Btn>}<button onClick={onLogout} style={{fontFamily:font,fontSize:12,background:"none",border:"none",color:C.textLt,cursor:"pointer"}}>Déconnexion</button></>}/>
    <div style={{maxWidth:760,margin:"0 auto",padding:"28px 24px"}}>

      {/* Bandeau utilisateur */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",background:C.surface,border:`1px solid ${C.border}`,borderRadius:10,padding:"14px 18px",marginBottom:20}}>
        <div>
          <p style={{fontSize:12,color:C.textLt,margin:"0 0 2px",fontFamily:mono,letterSpacing:1,textTransform:"uppercase"}}>Bonjour {displayName}</p>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <p style={{fontSize:15,margin:0,color:C.text}}>{currentPlan?.label||"Pré-rentrée"}</p>
            <Tag color={currentPlan?.price==="Gratuit"?C.util:C.accent} bg={currentPlan?.price==="Gratuit"?C.utilBg:C.accentBg} small>{currentPlan?.price||"Gratuit"}</Tag>
          </div>
        </div>
        {!isAdmin&&<button onClick={()=>setShowUpgrade(true)} style={{fontFamily:font,fontSize:12,fontWeight:600,padding:"9px 18px",cursor:"pointer",borderRadius:6,border:`1.5px solid ${C.accent}`,background:C.accentBg,color:C.accent,display:"flex",alignItems:"center",gap:7}}>💳 Changer d'abonnement</button>}
      </div>

      {/* Révision globale */}
      <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:12,padding:"20px 22px",marginBottom:24}}>
        <p style={{fontFamily:serif,fontSize:18,margin:"0 0 3px"}}>Révision globale</p>
        <p style={{fontSize:12,color:C.textMed,margin:"0 0 16px"}}>Toutes vos matières en une session</p>
        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10}}>
          {gModes.map(mode=>{const count=globalDue(allCards,progress,visibleIds,settings,mode.id),hasCards=count>0;return<button key={String(mode.id)} onClick={()=>hasCards&&onGlobalStudy(mode.id)} style={{fontFamily:font,padding:"14px 10px",cursor:hasCards?"pointer":"default",borderRadius:8,border:`1.5px solid ${hasCards?mode.col:C.border}`,background:hasCards?mode.bg:"transparent",color:hasCards?mode.col:C.textLt,display:"flex",flexDirection:"column",alignItems:"center",gap:6,transition:"transform 0.15s"}} onMouseEnter={e=>{if(hasCards)e.currentTarget.style.transform="translateY(-2px)";}} onMouseLeave={e=>{e.currentTarget.style.transform="none";}}><span style={{fontSize:11,fontWeight:600,textAlign:"center",lineHeight:1.3}}>{mode.label}</span><span style={{fontSize:18,fontWeight:300}}>{count}</span><span style={{fontSize:10,opacity:0.7}}>carte{count!==1?"s":""}</span></button>;})}
        </div>
      </div>

      {/* Onglets */}
      <div style={{display:"flex",gap:8,marginBottom:20,flexWrap:"wrap"}}>
        {TABS.map(tab=>{
          const active=activeTab===tab.id;
          const access=hasTabAccess(tab);
          return<button key={tab.id} onClick={()=>setActiveTab(tab.id)} style={{fontFamily:font,fontSize:13,fontWeight:active?600:400,padding:"8px 20px",cursor:"pointer",borderRadius:8,border:`1.5px solid ${active?C.accent:C.border}`,background:active?C.accentBg:"transparent",color:active?C.accent:access?C.textMed:C.textLt}}>
            {tab.label}{!access&&<span style={{fontSize:9,marginLeft:6,color:C.textLt}}>🔒</span>}
          </button>;
        })}
        {!isAdmin&&<button onClick={()=>setActiveTab("shop")} style={{fontFamily:font,fontSize:13,fontWeight:activeTab==="shop"?600:400,padding:"8px 20px",cursor:"pointer",borderRadius:8,border:`1.5px solid ${activeTab==="shop"?C.imp:C.border}`,background:activeTab==="shop"?C.impBg:"transparent",color:activeTab==="shop"?C.imp:C.textMed,display:"flex",alignItems:"center",gap:6}}>🛒 Acheter par matière</button>}
        {!isAdmin&&<button onClick={()=>setActiveTab("mes-cartes")} style={{fontFamily:font,fontSize:13,fontWeight:activeTab==="mes-cartes"?600:400,padding:"8px 20px",cursor:"pointer",borderRadius:8,border:`1.5px solid ${activeTab==="mes-cartes"?"#7c3aed":C.border}`,background:activeTab==="mes-cartes"?"#f5f3ff":"transparent",color:activeTab==="mes-cartes"?"#7c3aed":C.textMed,display:"flex",alignItems:"center",gap:6}}>✏️ Mes flashcards{(userCards||[]).length>0&&<span style={{fontFamily:mono,fontSize:8,fontWeight:700,padding:"1px 6px",borderRadius:10,background:"#7c3aed",color:"#fff"}}>{(userCards||[]).length}</span>}</button>}
        {!isAdmin&&<button onClick={()=>setActiveTab("stats")} style={{fontFamily:font,fontSize:13,fontWeight:activeTab==="stats"?600:400,padding:"8px 20px",cursor:"pointer",borderRadius:8,border:`1.5px solid ${activeTab==="stats"?C.accent:C.border}`,background:activeTab==="stats"?C.accentBg:"transparent",color:activeTab==="stats"?C.accent:C.textMed,display:"flex",alignItems:"center",gap:6}}>📊 Statistiques</button>}
      </div>

      {/* Tab content */}
      {activeTab==="stats"&&!isAdmin?(
        <StatsTab username={currentUser.username}/>
      ):activeTab==="mes-cartes"&&!isAdmin?(
        <MyCardsTab userCards={userCards||[]} onNew={onNewUserCard} onEdit={onEditUserCard} onDelete={onDeleteUserCard} onToggleIntegration={onToggleIntegration} progress={progress} onStudyUser={onStudyUser}/>
      ):activeTab==="shop"&&!isAdmin?(
        <ShopTab userGroups={userGroups} planId={planId} username={currentUser.username} cards={allCards} progress={progress} settings={settings} onStudy={onStudy} onShowPacks={()=>setShowUpgrade(true)}/>
      ):tabHasAccess?(
        <div>
          <p style={{fontFamily:serif,fontSize:18,margin:"0 0 14px"}}>Par matière · Cours · Chapitre</p>
          {tabGroups.map(g=><GroupBlock key={g.id} group={g}/>)}
        </div>
      ):(
        <div style={{border:`1.5px dashed ${C.border}`,borderRadius:12,padding:"48px 24px",textAlign:"center",background:C.surface}}>
          <p style={{fontSize:32,margin:"0 0 12px"}}>🔒</p>
          <p style={{fontFamily:serif,fontSize:20,margin:"0 0 8px"}}>{TABS.find(t=>t.id===activeTab)?.label}</p>
          <p style={{fontSize:14,color:C.textMed,margin:"0 0 24px",lineHeight:1.6}}>Cet abonnement n'est pas inclus dans ton offre actuelle.<br/>Débloque l'accès pour <strong>{TABS.find(t=>t.id===activeTab)?.price}</strong>.</p>
          {!isAdmin&&<button onClick={()=>setShowUpgrade(true)} style={{fontFamily:font,fontSize:14,fontWeight:600,padding:"12px 28px",cursor:"pointer",borderRadius:8,border:`1.5px solid ${C.accent}`,background:C.accentBg,color:C.accent}}>💳 S'abonner →</button>}
        </div>
      )}
    </div>
    {showUpgrade&&<UpgradeModal currentPlanId={currentUser.plan?.planId} username={currentUser.username} onClose={()=>setShowUpgrade(false)}/>}
    <Footer/>
  </div>;
}

// ─── Study ────────────────────────────────────────────────────────────────────
function StudyView({label,queue,onRate,onBack,settings,isAdmin}){
  const [idx,setIdx]=useState(0),[showBack,setShowBack]=useState(false),[showOthers,setShowOthers]=useState(false),[localQ,setLocalQ]=useState(queue),[done,setDone]=useState(false),[stats,setStats]=useState({correct:0,total:0});
  const cardStart=useRef(Date.now()); // Track time per card for stats
  const card=localQ[idx];
  const handleRate=async rating=>{
    const elapsed=Date.now()-cardStart.current;
    setStats(s=>({total:s.total+1,correct:s.correct+(rating>=3?1:0)}));
    const np=await onRate(card,rating,elapsed); // Pass elapsed for stats
    cardStart.current=Date.now(); // Reset timer for next card
    const q=[...localQ];
    if(np.state==="learning"||np.state==="relearning"){q.splice(idx,1);q.splice(Math.min(idx+4,q.length),0,card);}else q.splice(idx,1);
    setLocalQ(q);if(!q.length||idx>=q.length){setDone(true);return;}setShowBack(false);setShowOthers(false);
  };
  if(done||!card)return <div style={{fontFamily:font,background:C.bg,minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:12}}><div style={{fontSize:52}}>✓</div><p style={{fontFamily:serif,fontSize:26,margin:0}}>Session terminée</p><p style={{fontSize:14,color:C.textMed}}>{stats.correct}/{stats.total} · {stats.total>0?Math.round((stats.correct/stats.total)*100):0}%</p><Btn fill style={{marginTop:20}} onClick={onBack}>← Tableau de bord</Btn></div>;
  const col=pC(card.packetId),grp=GROUPS.find(g=>g.id===card.groupId);
  const chName=getChapters(card.groupId,card.num)[card.chapterId-1];
  return <div style={{fontFamily:font,background:C.bg,minHeight:"100vh",color:C.text}}>

// ─── App ──────────────────────────────────────────────────────────────────────
function App(){
  const [view,setView]=useState("loading"),[currentUser,setCurrentUser]=useState(null),[cards,setCards]=useState([]),[prog,setProg]=useState({}),[settings,setSettings]=useState(DEFAULT_SETTINGS),[accounts,setAccounts]=useState([]),[studyCtx,setStudyCtx]=useState(null),[paymentStatus,setPaymentStatus]=useState(null);
  const [userCards,setUserCards]=useState([]); // Personal cards for the logged-in user
  const [userCardEditor,setUserCardEditor]=useState(null); // null=hidden, false=new, card=edit

  useEffect(()=>{
    async function init(){
      try {
        const savedSet=storage.get("mx6-settings");
        if(savedSet)setSettings({...DEFAULT_SETTINGS,...savedSet});
        const fetchWithTimeout=(url,opts,ms=6000)=>{const ctrl=new AbortController();const timer=setTimeout(()=>ctrl.abort(),ms);return fetch(url,{...opts,signal:ctrl.signal}).finally(()=>clearTimeout(timer));};
        let loadedCards=null;
        try {
          const r=await fetchWithTimeout(`${SUPA_URL}/rest/v1/cards?select=*`,{headers:H});
          const d=await r.json();
          if(Array.isArray(d)&&d.length>0){loadedCards=d.map(c=>({id:c.id,front:c.front,back:c.back,groupId:c.group_id,num:c.num,chapterId:c.chapter_id||1,packetId:c.packet_id}));}
        } catch(e){ console.warn("Supabase cards inaccessible",e); }
        if(loadedCards){setCards(loadedCards);}else{for(const c of INITIAL_CARDS){try{await supa.upsertCard(c);}catch{}}setCards(INITIAL_CARDS);}
        let loadedAccounts=[];
        try {
          const r=await fetchWithTimeout(`${SUPA_URL}/rest/v1/accounts?select=*`,{headers:H});
          loadedAccounts=await r.json();
          if(!Array.isArray(loadedAccounts))loadedAccounts=[];
        } catch(e){ console.warn("Supabase accounts inaccessible",e); }
        setAccounts(loadedAccounts);
      } catch(e){
        console.error("Init error:",e);
        setCards(INITIAL_CARDS);
        setAccounts([]);
      } finally {
        const saved=storage.get("mx6-session");
        if(saved){
          let planId=toSubscriptionPlan(saved.plan?.planId||"prerentree");
          let groups=Array.isArray(saved.plan?.groups)?[...saved.plan.groups]:[];
          let pendingApplied=false;
          let pendingGroups=[];
          try{
            const pending=JSON.parse(localStorage.getItem("mx6-pending-purchase")||"null");
            if(pending&&pending.username===saved.username&&Date.now()-pending.ts<1200000){
              // Recent pending purchase — apply it (user just returned from Stripe)
              const pp=PLANS.find(p=>p.id===pending.planId);
              if(pp){
                const isFullPlan=["sem1","sem2","both"].includes(pending.planId);
                if(isFullPlan)planId=pending.planId;
                pendingGroups=pp.groups||[];
                saveExtraGroups(saved.username,[...getExtraGroups(saved.username),...pendingGroups]);
                pendingApplied=true;
              }
              localStorage.removeItem("mx6-pending-purchase");
            } else if(pending&&Date.now()-pending.ts>=1200000){
              // Expired pending purchase — clear it (user probably canceled)
              localStorage.removeItem("mx6-pending-purchase");
            }
          }catch{}
          // Merge: session groups + extra groups (includes all previously saved individual purchases)
          const extra=getExtraGroups(saved.username);
          const restoredGroups=computeGroups(planId,groups,extra);
          const restored={...saved,plan:{planId,groups:restoredGroups}};
          setProg(storage.get(`mx6-prog-${saved.username}`)||{});
          // Load userCards from cache instantly (Supabase fetch will update async)
          if(saved.role!=="admin"){
            const cached=mergeIntegrated(getUCache(saved.username),saved.username);
            if(cached.length>0)setUserCards(cached);
          }
          setCurrentUser(restored);
          storage.set("mx6-session",restored);
          setView("dashboard");
          // ── Persist new purchase to Supabase backend (makes it permanent across devices) ──
          if(pendingApplied&&saved.username){
            supa.updateGroups(saved.username,restoredGroups,planId).catch(()=>{});
          }
        }else{setView("login");}
      }
    }
    init();
  },[]);

  useEffect(()=>{
    if(!currentUser)return;
    const params=new URLSearchParams(window.location.search);
    const payment=params.get("payment");
    if(!payment)return;
    window.history.replaceState({},"",window.location.pathname);
    // On cancel: clear any pending purchase so it's not applied on next load
    if(payment==="cancel"){
      localStorage.removeItem("mx6-pending-purchase");
      setPaymentStatus("cancel");
      const t=setTimeout(()=>setPaymentStatus(null),6000);return()=>clearTimeout(t);
    }
    if(payment==="success"&&currentUser.role!=="admin"){
      setPaymentStatus("success");
      // Apply any remaining pending purchase not yet handled by init()
      const pending=JSON.parse(localStorage.getItem("mx6-pending-purchase")||"null");
      if(pending&&pending.username===currentUser.username){
        const pp=PLANS.find(p=>p.id===pending.planId);
        if(pp){
          const isFullPlan=["sem1","sem2","both"].includes(pending.planId);
          const subPlanId=isFullPlan?pending.planId:(currentUser.plan?.planId||"prerentree");
          const extra=getExtraGroups(currentUser.username);
          saveExtraGroups(currentUser.username,[...extra,...pp.groups]);
          const newGroups=computeGroups(subPlanId,currentUser.plan?.groups||[],pp.groups);
          const immediateUser={...currentUser,plan:{planId:subPlanId,groups:newGroups}};
          setCurrentUser(immediateUser);
          storage.set("mx6-session",immediateUser);
          // ── Persist to Supabase immediately (permanent cross-device storage) ──
          supa.updateGroups(currentUser.username,newGroups,isFullPlan?subPlanId:undefined).catch(()=>{});
        }
        localStorage.removeItem("mx6-pending-purchase");
      }
      // Also re-fetch Supabase to catch webhook-applied changes
      setTimeout(async()=>{
        try{
          const acc=await supa.getAccount(currentUser.username);
          if(!acc)return;
          setAccounts(prev=>prev.map(a=>a.username===currentUser.username?{...a,...acc}:a));
          const rawPlanId=acc.plan_id||acc.planId;
          const isFullPlan=["sem1","sem2","both"].includes(rawPlanId);
          const subPlanId=isFullPlan?rawPlanId:(currentUser.plan?.planId||"prerentree");
          const supaGroups=Array.isArray(acc.groups)?acc.groups:[];
          const extra=getExtraGroups(currentUser.username);
          const mergedGroups=computeGroups(subPlanId,supaGroups,extra);
          const newUser={...currentUser,plan:{planId:subPlanId,groups:mergedGroups}};
          setCurrentUser(newUser);
          storage.set("mx6-session",newUser);
        }catch{}
      },3000);
    }
    const t=setTimeout(()=>setPaymentStatus(null),8000);return()=>clearTimeout(t);
  },[currentUser]);

  const handleLogin=(email,password)=>{
    const lc=email.toLowerCase();
    if(lc===ADMIN_USERNAME&&password===ADMIN_PASSWORD){const u={username:ADMIN_USERNAME,role:"admin",plan:{planId:"both",groups:ALL}};setProg(storage.get(`mx6-prog-${ADMIN_USERNAME}`)||{});setCurrentUser(u);storage.set("mx6-session",u);setView("dashboard");return true;}
    const acc=accounts.find(a=>a.username===lc&&a.password===password);
    if(acc){
      const rawPlanId=acc.plan_id||acc.planId;
      // Only full plans control tab access; individual g-* purchases don't change subscription tier
      const subPlanId=toSubscriptionPlan(rawPlanId);
      const supaGroups=Array.isArray(acc.groups)?acc.groups:[];
      const extra=getExtraGroups(lc);
      const groups=computeGroups(subPlanId,supaGroups,extra);
      const u={username:acc.username,role:"student",plan:{planId:subPlanId,groups}};
      setProg(storage.get(`mx6-prog-${lc}`)||{});setCurrentUser(u);storage.set("mx6-session",u);setView("dashboard");return true;
    }
    return false;
  };

  const logout=()=>{storage.del("mx6-session");setCurrentUser(null);setProg({});setView("login");};
  const saveProg=useCallback(p=>{setProg(p);if(currentUser)storage.set(`mx6-prog-${currentUser.username}`,p);},[currentUser]);
  const saveSet=useCallback(s=>{setSettings(s);storage.set("mx6-settings",s);},[]);
  const handleSaveCard=useCallback(async cd=>{await supa.upsertCard(cd);setCards(p=>p.find(c=>c.id===cd.id)?p.map(c=>c.id===cd.id?cd:c):[...p,cd]);},[]);
  const handleDeleteCard=useCallback(async id=>{await supa.deleteCard(id);setCards(p=>p.filter(c=>c.id!==id));},[]);
  const handleSaveUser=useCallback(async acc=>{await supa.upsertAccount(acc);setAccounts(p=>p.find(a=>a.username===acc.username)?p.map(a=>a.username===acc.username?{...a,...acc,plan_id:acc.planId}:a):[...p,{...acc,plan_id:acc.planId}]);},[]);
  const handleDeleteUser=useCallback(async username=>{await supa.deleteAccount(username);setAccounts(p=>p.filter(a=>a.username!==username));},[]);
  const handleRegister=useCallback(async newAcc=>{await supa.upsertAccount(newAcc);setAccounts(p=>[...p,{...newAcc,plan_id:newAcc.planId}]);const u={username:newAcc.username,role:"student",plan:{planId:newAcc.planId,groups:newAcc.groups}};setProg({});setCurrentUser(u);storage.set("mx6-session",u);},[]);

  // ── User personal cards — smart merge between Supabase and localStorage cache ──
  useEffect(()=>{
    if(!currentUser||currentUser.role==="admin"){setUserCards([]);return;}
    const cached=mergeIntegrated(getUCache(currentUser.username),currentUser.username);
    // Show cache immediately while Supabase loads
    if(cached.length>0)setUserCards(cached);

    supa.getUserCards(currentUser.username).then(uc=>{
      if(uc===null){
        // Supabase error (table might not exist yet, or network issue)
        // → keep whatever we have (cache or already-set state), don't overwrite
        console.warn("user_cards fetch failed — using localStorage cache");
        return;
      }
      // Supabase succeeded: merge Supabase cards with any cache-only cards
      // (cache might have cards pending Supabase sync)
      const supaIds=new Set(uc.map(c=>c.id));
      const cacheExtras=cached.filter(c=>!supaIds.has(c.id));
      const merged=mergeIntegrated([...uc,...cacheExtras],currentUser.username);
      setUserCards(merged);
      setUCache(currentUser.username,merged); // Update cache with authoritative data
    });
  },[currentUser?.username]);

  const handleSaveUserCard=useCallback(async(cardOrCards)=>{
    const list=Array.isArray(cardOrCards)?cardOrCards:[cardOrCards];
    let newCards=[...userCards];
    for(const card of list){
      const c={...card,
        id:card.id||`u-${Date.now()}-${Math.random().toString(36).slice(2,7)}`,
        username:currentUser.username,isUserCard:true,integrated:card.integrated||false};
      newCards=newCards.find(x=>x.id===c.id)?newCards.map(x=>x.id===c.id?c:x):[...newCards,c];
    }
    // Persist to localStorage FIRST (survives even if Supabase fails)
    setUserCards(newCards);
    setUCache(currentUser.username,newCards);
    // Then persist to Supabase (async, best-effort)
    for(const card of list){
      const c=newCards.find(x=>x.id===card.id)||card;
      supa.upsertUserCard(c).catch(()=>{});
    }
    setUserCardEditor(null);
  },[currentUser,userCards]);

  const handleDeleteUserCard=useCallback(async id=>{
    await supa.deleteUserCard(id);
    setUserCards(prev=>{
      const newCards=prev.filter(c=>c.id!==id);
      setUCache(currentUser.username,newCards); // Persist cache
      return newCards;
    });
    // Also remove from integrated localStorage
    const ids=getIntegratedIds(currentUser.username);
    ids.delete(id);
    saveIntegratedIds(currentUser.username,ids);
  },[currentUser,userCards]);

  // ── Background Supabase sync on login: picks up webhook-applied group changes ──
  useEffect(()=>{
    if(!currentUser||currentUser.role==="admin")return;
    const timer=setTimeout(async()=>{
      try{
        const acc=await supa.getAccount(currentUser.username);
        if(!acc)return;
        const rawPlanId=acc.plan_id||acc.planId;
        const isFullPlan=["sem1","sem2","both"].includes(rawPlanId);
        const subPlanId=isFullPlan?rawPlanId:(currentUser.plan?.planId||"prerentree");
        const supaGroups=Array.isArray(acc.groups)?acc.groups:[];
        const extra=getExtraGroups(currentUser.username);
        const mergedGroups=computeGroups(subPlanId,supaGroups,extra);
        // Push any locally-stored extra groups that aren't in Supabase yet → persistent backend sync
        const extraNotInSupa=extra.filter(g=>!supaGroups.includes(g));
        if(extraNotInSupa.length>0){
          supa.updateGroups(currentUser.username,mergedGroups,isFullPlan?subPlanId:undefined).catch(()=>{});
        }
        // Update local state if anything changed
        const curStr=JSON.stringify([...(currentUser.plan?.groups||[])].sort());
        const newStr=JSON.stringify([...mergedGroups].sort());
        if(subPlanId!==currentUser.plan?.planId||curStr!==newStr){
          const newUser={...currentUser,plan:{planId:subPlanId,groups:mergedGroups}};
          setCurrentUser(newUser);
          storage.set("mx6-session",newUser);
        }
      }catch{}
    },4000);
    return()=>clearTimeout(timer);
  },[currentUser?.username]);

  const handleToggleIntegration=useCallback(async(card)=>{
    const updated={...card,integrated:!card.integrated};
    // Persist to localStorage FIRST (survives even if Supabase fails / column missing)
    const ids=getIntegratedIds(currentUser.username);
    updated.integrated?ids.add(card.id):ids.delete(card.id);
    saveIntegratedIds(currentUser.username,ids);
    setUserCards(prev=>{
      const newCards=prev.map(c=>c.id===card.id?updated:c);
      setUCache(currentUser.username,newCards);
      return newCards;
    });
    // Then persist to Supabase (async, best-effort — fails silently if column missing)
    supa.upsertUserCard(updated).catch(()=>{});
  },[currentUser]);

  // Study personal cards only (from MyCardsTab) — uses userCards, not allCards
  const startUserCardStudy=useCallback((gid,num,chapterId,pkId)=>{
    const filtered=userCards.filter(c=>
      c.groupId===gid&&c.num===num&&
      (chapterId===null||c.chapterId===chapterId)&&
      (pkId===null||c.packetId===pkId)
    );
    const queue=buildQueue(filtered,prog,settings);
    if(!queue.length){alert("Aucune carte personnelle à réviser dans cette sélection !");return;}
    const grp=GROUPS.find(g=>g.id===gid);
    const chName=chapterId?getChapters(gid,num)[chapterId-1]:"";
    const pkLabel=pkId?PACKETS.find(p=>p.id===pkId)?.label:"Tout";
    const label=`Personnel · ${grp?.label} · Cours ${num}${chName?" · "+chName:""}${pkLabel?" · "+pkLabel:""}`;
    setStudyCtx({label,queue});
    setView("study");
  },[userCards,prog,settings]);

  const allCards=useMemo(()=>[
    ...cards,
    ...userCards.filter(c=>c.integrated) // Only integrated personal cards appear in GroupBlock/onglets
  ],[cards,userCards]);

  const startStudy=useCallback((gid,num,chapterId,pkId)=>{
    // Personal cards mode
    if(gid==="__user__"){
      const queue=buildQueue(userCards,prog,settings);
      if(!queue.length){alert("Aucune carte personnelle à réviser !");return;}
      setStudyCtx({label:"Mes flashcards personnelles",queue});setView("study");return;
    }
    const grp=GROUPS.find(g=>g.id===gid);
    // "Tout" (chapitre) ou "Cours complet" → même SRS que les boutons de paquets, mais tous paquets combinés
    if(pkId==="__all__"||pkId==="__course__"){
      const isCourse=pkId==="__course__";
      const filtered=allCards.filter(c=>c.groupId===gid&&c.num===num&&(isCourse||c.chapterId===chapterId));
      const queue=buildQueue(filtered,prog,settings); // SRS: only due cards
      if(!queue.length){alert(isCourse?"Aucune carte à réviser pour ce cours !":"Aucune carte à réviser pour ce chapitre !");return;}
      const chName=!isCourse&&chapterId?getChapters(gid,num)[chapterId-1]:`Ch.${chapterId}`;
      const label=isCourse
        ?`${grp?.label} · Cours ${num} · Cours complet`
        :`${grp?.label} · Cours ${num} · ${chName} · Tout`;
      setStudyCtx({label,queue});
      setView("study");return;
    }
    // Normal SRS study (only due cards)
    const queue=buildQueue(allCards.filter(c=>c.groupId===gid&&c.num===num&&c.chapterId===chapterId&&c.packetId===pkId),prog,settings);
    if(!queue.length){alert("Aucune carte à réviser !");return;}
    const chName=getChapters(gid,num)[chapterId-1]||`Ch. ${chapterId}`;
    setStudyCtx({label:`${grp?.label} · Cours ${num} · ${chName} · ${PACKETS.find(p=>p.id===pkId)?.label}`,queue});
    setView("study");
  },[allCards,userCards,prog,settings]);

  const startGlobalStudy=useCallback(pkId=>{
    const ids=currentUser?.plan?.groups||[];
    const queue=buildQueue(allCards.filter(c=>ids.includes(c.groupId)&&(!pkId||c.packetId===pkId)),prog,settings);
    if(!queue.length){alert("Aucune carte à réviser !");return;}
    setStudyCtx({label:pkId?`Révision globale · ${PACKETS.find(p=>p.id===pkId)?.label}`:"Révision globale · Toutes",queue});
    setView("study");
  },[allCards,prog,currentUser,settings]);

  const handleRate=useCallback(async(card,rating,elapsedMs=0)=>{
    const np=computeNext(prog[card.id],rating,settings);
    saveProg({...prog,[card.id]:np});
    // Record study stat (not for admin)
    if(currentUser&&currentUser.role!=="admin"){
      recordStat(currentUser.username, rating>=3, elapsedMs);
    }
    return np;
  },[prog,saveProg,settings,currentUser]);

  if(view==="loading") return <div style={{fontFamily:font,background:C.bg,minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:16}}><p style={{fontFamily:serif,fontSize:28,letterSpacing:-0.5}}>MyFlashcard</p><p style={{color:C.textLt,fontSize:13}}>Chargement…</p></div>;
  if(view==="landing")   return <Landing onBack={()=>setView("login")} onRegister={()=>setView("register")}/>;
  if(view==="login")     return <LoginView onLogin={handleLogin} onShowLanding={()=>setView("landing")} onRegister={()=>setView("register")} accounts={accounts} onPasswordReset={(em,pwd)=>setAccounts(p=>p.map(a=>a.username===em?{...a,password:pwd}:a))}/>;
  if(view==="register")  return <RegisterView onRegister={acc=>{handleRegister(acc);setView("dashboard");}} onBack={()=>setView("login")} accounts={accounts}/>;
  // User card editor: CardEditor in user mode (creates to user_cards table)
  if(userCardEditor!==null&&currentUser?.role!=="admin")return <CardEditor card={userCardEditor||null} onSave={handleSaveUserCard} onCancel={()=>setUserCardEditor(null)} userGroups={currentUser?.plan?.groups||[]}/>;
  if(view==="dashboard"&&currentUser) return <Dashboard currentUser={currentUser} cards={cards} userCards={userCards} progress={prog} settings={settings} onStudy={startStudy} onGlobalStudy={startGlobalStudy} onAdmin={()=>setView("admin")} onSettings={()=>setView("settings")} onLogout={logout} onNewUserCard={()=>setUserCardEditor(false)} onEditUserCard={c=>setUserCardEditor(c)} onDeleteUserCard={handleDeleteUserCard} onToggleIntegration={handleToggleIntegration} onStudyUser={startUserCardStudy} paymentStatus={paymentStatus} onClosePaymentBanner={()=>setPaymentStatus(null)}/>;
  if(view==="study"&&studyCtx) return <StudyView label={studyCtx.label} queue={studyCtx.queue} onRate={handleRate} onBack={()=>setView("dashboard")} settings={settings} isAdmin={currentUser?.role==="admin"}/>;
  if(view==="admin")     return <AdminView cards={cards} accounts={accounts} onSaveCard={handleSaveCard} onDeleteCard={handleDeleteCard} onSaveUser={handleSaveUser} onDeleteUser={handleDeleteUser} onBack={()=>setView("dashboard")}/>;
  if(view==="settings")  return <SettingsView settings={settings} onSave={saveSet} onBack={()=>setView("dashboard")}/>;
  return null;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>

<html lang="fr">
<head>
  <meta charset="UTF-8"/>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #f5f3ee; }
    input[type=range] { accent-color: #2c4a7c; }

</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.23.9/babel.min.js"></script>

  <script type="text/babel">
    const { useState, useEffect, useCallback, useMemo } = React;

    // ─── Supabase ────────────────────────────────────────────────────────────
    const SUPA_URL  = "https://cytdlgvtwvofwrgqnkhe.supabase.co";
    const SUPA_KEY  = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN5dGRsZ3Z0d3ZvZndyZ3Fua2hlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkwMTU4MTIsImV4cCI6MjA5NDU5MTgxMn0.QLQrzrkAjDjEY1x0VJwMguteUYdcGJ_pREX03VElyOs";
    const supaHeaders = { "Content-Type": "application/json", "apikey": SUPA_KEY, "Authorization": `Bearer ${SUPA_KEY}` };

    const supa = {
      // Cards
      getCards: async () => {
        try {
          const r = await fetch(`${SUPA_URL}/rest/v1/cards?select=*`, { headers: supaHeaders });
          const data = await r.json();
          // Convert snake_case to camelCase
          return data.map(c => ({ id: c.id, front: c.front, back: c.back, groupId: c.group_id, num: c.num, packetId: c.packet_id }));
        } catch { return null; }
      },
      upsertCard: async (card) => {
        try {
          await fetch(`${SUPA_URL}/rest/v1/cards`, {
            method: "POST",
            headers: { ...supaHeaders, "Prefer": "resolution=merge-duplicates" },
            body: JSON.stringify({ id: card.id, front: card.front, back: card.back, group_id: card.groupId, num: card.num, packet_id: card.packetId }),
          });
        } catch {}
      },
      deleteCard: async (id) => {
        try {
          await fetch(`${SUPA_URL}/rest/v1/cards?id=eq.${id}`, { method: "DELETE", headers: supaHeaders });
        } catch {}
      },
      // Accounts
      getAccounts: async () => {
        try {
          const r = await fetch(`${SUPA_URL}/rest/v1/accounts?select=*`, { headers: supaHeaders });
          return await r.json();
        } catch { return []; }
      },
      upsertAccount: async (acc) => {
        try {
          await fetch(`${SUPA_URL}/rest/v1/accounts`, {
            method: "POST",
            headers: { ...supaHeaders, "Prefer": "resolution=merge-duplicates" },
            body: JSON.stringify({ username: acc.username, password: acc.password, email: acc.email || "", plan_id: acc.planId, groups: acc.groups }),
          });
        } catch {}
      },
      deleteAccount: async (username) => {
        try {
          await fetch(`${SUPA_URL}/rest/v1/accounts?username=eq.${username}`, { method: "DELETE", headers: supaHeaders });
        } catch {}
      },
    };

    // ─── Local storage (session, settings, progress uniquement) ─────────────
    const storage = {
      get:  (k) => { try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : null; } catch { return null; } },
      set:  (k, v) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} },
      del:  (k) => { try { localStorage.removeItem(k); } catch {} },
    };

    // ─── Constants ──────────────────────────────────────────────────────────
    const GROUPS = [
      { id: "cell-bio", label: "Biologie cellulaire",                    sem: 1, nums: [1,2,3]   },
      { id: "histo",    label: "Histologie & Biologie du développement",  sem: 1, nums: [1,2,3]   },
      { id: "biochem",  label: "Biochimie",                               sem: 1, nums: [1,2,3]   },
      { id: "biophys",  label: "Biophysique",                             sem: 1, nums: [1,2,3]   },
      { id: "biostat",  label: "Biostatistique",                          sem: 1, nums: [1]        },
      { id: "anatomie", label: "Anatomie",                                sem: 2, nums: [1,2,3]   },
      { id: "physio",   label: "Physiologie",                             sem: 2, nums: [1,2,3,4] },
      { id: "medic",    label: "Introduction à la connaissance du médicament", sem: 2, nums: [1,2,3] },
      { id: "ssh",      label: "Sciences sociales et humaines",           sem: 2, nums: [1,2,3]   },
    ];
    const PACKETS = [
      { id: "prioritaire", label: "Prioritaire" },
      { id: "important",   label: "Important"   },
      { id: "utile",       label: "Utile"        },
    ];
    const SEM1 = GROUPS.filter(g => g.sem === 1).map(g => g.id);
    const SEM2 = GROUPS.filter(g => g.sem === 2).map(g => g.id);
    const ALL  = [...SEM1, ...SEM2];

    const PLANS = [
      { id: "sem1",       label: "Semestre 1",     price: "99 €",   groups: SEM1, desc: "Toutes les matières du semestre 1" },
      { id: "sem2",       label: "Semestre 2",     price: "149 €",  groups: SEM2, desc: "Toutes les matières du semestre 2" },
      { id: "both",       label: "Année complète", price: "200 €",  groups: ALL,  desc: "Tous les semestres · Accès illimité" },
      { id: "prerentree", label: "Pré-rentrée",    price: "Gratuit",groups: [],   desc: "Matières de pré-rentrée · Accès offert" },
      { id: "g-cell-bio", label: "Biologie cellulaire",   price: "49 €", groups: ["cell-bio"], desc: "Cours 1, 2 et 3" },
      { id: "g-histo",    label: "Histologie & Bio. dév.", price: "39 €", groups: ["histo"],    desc: "Cours 1, 2 et 3" },
      { id: "g-biochem",  label: "Biochimie",              price: "39 €", groups: ["biochem"],  desc: "Cours 1, 2 et 3" },
      { id: "g-biophys",  label: "Biophysique",            price: "19 €", groups: ["biophys"],  desc: "Cours 1, 2 et 3" },
      { id: "g-biostat",  label: "Biostatistique",         price: "9 €",  groups: ["biostat"],  desc: "Cours 1" },
      { id: "g-anatomie", label: "Anatomie",               price: "49 €", groups: ["anatomie"], desc: "Cours 1, 2 et 3" },
      { id: "g-physio",   label: "Physiologie",            price: "49 €", groups: ["physio"],   desc: "Cours 1, 2, 3 et 4" },
      { id: "g-medic",    label: "Intro. médicament",      price: "39 €", groups: ["medic"],    desc: "Cours 1, 2 et 3" },
      { id: "g-ssh",      label: "Sciences sociales",      price: "29 €", groups: ["ssh"],      desc: "Cours 1, 2 et 3" },
    ];

    const ADMIN_USERNAME = "admin";
    const ADMIN_PASSWORD = "medecine2024";
    const DEFAULT_SETTINGS = { againMin:1, hardMin:5, goodMin:10, easyDays:4, newCardsPerDay:20, maxReviewsPerDay:100, dailyGroups:[], dailyPackets:[] };
    const INITIAL_CARDS = [
      { id:"cb1p1", front:"Qu'est-ce que la membrane plasmique ?",   back:"Bicouche lipidique composée de phospholipides, cholestérol et protéines membranaires. Rôle de barrière sélective et d'interface de signalisation cellulaire.", groupId:"cell-bio", num:1, packetId:"prioritaire" },
      { id:"cb1p2", front:"Décrivez les phases du cycle cellulaire", back:"G1 (croissance) → S (réplication ADN) → G2 (vérification) → M (mitose). Points de contrôle régulés par complexes cycline-CDK et protéine Rb.", groupId:"cell-bio", num:1, packetId:"prioritaire" },
      { id:"cb1i1", front:"Qu'est-ce que l'apoptose ?",              back:"Mort cellulaire programmée. Voie intrinsèque (mitochondriale → caspase-9) et extrinsèque (récepteurs de mort → caspase-8). Sans inflammation.", groupId:"cell-bio", num:1, packetId:"important" },
    ];

    // ─── SRS ────────────────────────────────────────────────────────────────
    function computeNext(prev, rating, s = DEFAULT_SETTINGS) {
      const { againMin=1, hardMin=5, goodMin=10, easyDays=4 } = s;
      const { state="new", step=0, interval=1, ease=2.5, reps=0, lapses=0, lapseInt=1 } = prev || {};
      const mf = m => new Date(Date.now() + m*60000).toISOString();
      const df = d => new Date(Date.now() + d*86400000).toISOString();
      const base = { ease, reps, lapses, lapseInt };
      if (state==="new"||state==="learning") {
        if (rating===1) return {...base, state:"learning", step:0, interval:againMin, next:mf(againMin)};
        if (rating===2) return {...base, state:"learning", step:1, interval:hardMin,  next:mf(hardMin)};
        if (rating===3) { if(step>=2) return {...base,state:"review",step:0,interval:1,reps:1,lapseInt:0,next:df(1)}; return {...base,state:"learning",step:2,interval:goodMin,next:mf(goodMin)}; }
        return {...base, state:"review", step:0, interval:easyDays, reps:1, lapseInt:0, next:df(easyDays)};
      }
      if (state==="review") {
        if (rating===1) { const li=Math.max(1,Math.round(interval*0.2)); return {state:"relearning",step:0,interval,ease:Math.max(1.3,ease-0.2),reps,lapses:lapses+1,lapseInt:li,next:mf(againMin)}; }
        let ni, ne=ease;
        if(rating===2){ni=Math.max(interval+1,Math.round(interval*1.2));ne=Math.max(1.3,ease-0.15);}
        else if(rating===3){ni=Math.max(interval+1,Math.round(interval*ease));}
        else{ni=Math.max(interval+1,Math.round(interval*ease*1.3));ne=Math.min(3.5,ease+0.15);}
        return {state:"review",step:0,interval:ni,ease:ne,reps:reps+1,lapses,lapseInt:0,next:df(ni)};
      }
      if (rating===1) return {...prev, next:mf(againMin)};
      const ni=Math.max(1,lapseInt); return {state:"review",step:0,interval:ni,ease,reps:reps+1,lapses,lapseInt:0,next:df(ni)};
    }
    function getIntervalLabel(prev, rating, s=DEFAULT_SETTINGS) {
      const r=computeNext(prev,rating,s);
      if(r.state==="learning"||r.state==="relearning"){const m=Math.max(1,Math.round((new Date(r.next)-Date.now())/60000));return m<60?`${m} min`:`${Math.round(m/60)} h`;}
      const d=r.interval; if(d===1)return"1 jour";if(d<7)return`${d} j`;if(d<30)return`${Math.round(d/7)} sem.`;if(d<365)return`${Math.round(d/30)} mois`;return`${(d/365).toFixed(1)} an${d>=730?"s":""}`;
    }
    function isDue(p)  { return !p?.next || new Date(p.next) <= new Date(); }
    function isNew(p)  { return !p || p.state==="new"; }
    function stateLabel(p) { if(!p||p.state==="new")return"Nouveau";if(p.state==="learning")return"Apprentissage";if(p.state==="relearning")return"Réapprentissage";return`Révision · J+${p.interval}`; }
    function filterCards(cards,gid,num,pkId){return cards.filter(c=>c.groupId===gid&&c.num===num&&c.packetId===pkId);}
    function packetStats(cards,prog,gid,num,pkId){const l=filterCards(cards,gid,num,pkId);return{total:l.length,due:l.filter(c=>isDue(prog[c.id])).length};}
    function buildQueue(cardList,prog,settings){
      const {dailyGroups,dailyPackets,maxReviewsPerDay}=settings;
      return cardList.filter(c=>{const p=prog[c.id];if(!isDue(p))return false;if(isNew(p)){if(dailyGroups.length>0&&!dailyGroups.includes(c.groupId))return false;if(dailyPackets.length>0&&!dailyPackets.includes(c.packetId))return false;}return true;}).slice(0,maxReviewsPerDay);
    }
    function globalDue(cards,prog,ids,settings,pkId=null){const el=cards.filter(c=>ids.includes(c.groupId)&&(!pkId||c.packetId===pkId));return buildQueue(el,prog,settings).length;}

    // ─── Design ─────────────────────────────────────────────────────────────
    const C={bg:"#f5f3ee",surface:"#ffffff",border:"#d0ccc4",text:"#1a1917",textMed:"#4e4a46",textLt:"#7a7672",accent:"#2c4a7c",accentBg:"#eef3fb",prio:"#9b2335",prioBg:"#fef2f4",imp:"#8b5e00",impBg:"#fef8e8",util:"#1e5a3a",utilBg:"#edf7f2",again:"#b91c1c",againBg:"#fff0f0",hard:"#b45309",hardBg:"#fff8ed",good:"#15803d",goodBg:"#edfdf3",easy:"#1d4ed8",easyBg:"#eff6ff"};
    const pC=id=>id==="prioritaire"?C.prio:id==="important"?C.imp:C.util;
    const pB=id=>id==="prioritaire"?C.prioBg:id==="important"?C.impBg:C.utilBg;
    const font="system-ui,-apple-system,'Segoe UI',sans-serif";
    const serif="Georgia,'Times New Roman',serif";
    const mono="'Courier New',Courier,monospace";
    const noSel={userSelect:"none",WebkitUserSelect:"none",MozUserSelect:"none"};
    const iLine={fontFamily:font,fontSize:14,color:C.text,background:"transparent",width:"100%",outline:"none",boxSizing:"border-box",border:"none",borderBottom:`1.5px solid ${C.border}`,padding:"8px 0"};
    const iBox={fontFamily:font,fontSize:14,color:C.text,background:"transparent",width:"100%",outline:"none",boxSizing:"border-box",border:`1.5px solid ${C.border}`,borderRadius:6,padding:"10px 12px",resize:"vertical"};

    // ─── Base components ─────────────────────────────────────────────────────
    function Tag({color,bg,children,small}){return <span style={{display:"inline-block",fontFamily:mono,fontSize:small?8:9,letterSpacing:2,textTransform:"uppercase",padding:small?"2px 6px":"3px 8px",borderRadius:3,background:bg||C.accentBg,color:color||C.accent,whiteSpace:"nowrap"}}>{children}</span>;}
    function Btn({fill,danger,small,full,disabled,children,style,...rest}){return <button {...rest} disabled={disabled} style={{fontFamily:font,fontSize:small?12:13,fontWeight:500,padding:small?"6px 12px":"9px 18px",cursor:disabled?"not-allowed":"pointer",border:`1.5px solid ${fill?C.accent:danger?C.again:C.border}`,borderRadius:6,background:fill?C.accent:"transparent",color:fill?"#fff":danger?C.again:C.text,display:"inline-flex",alignItems:"center",justifyContent:"center",gap:6,opacity:disabled?0.4:1,width:full?"100%":undefined,...style}}>{children}</button>;}
    function Modal({children,onClose,width=440}){return <div style={{position:"fixed",inset:0,background:"rgba(26,25,23,0.6)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1000,backdropFilter:"blur(2px)"}} onClick={e=>e.target===e.currentTarget&&onClose()}><div style={{background:C.surface,borderRadius:12,padding:"32px 28px",width,maxWidth:"94vw",maxHeight:"92vh",overflowY:"auto",position:"relative",boxShadow:"0 20px 60px rgba(0,0,0,0.18)"}}><button onClick={onClose} style={{position:"absolute",top:14,right:16,background:"none",border:"none",fontSize:20,cursor:"pointer",color:C.textLt}}>×</button>{children}</div></div>;}
    function Lbl({children,color}){return <p style={{fontFamily:mono,fontSize:9,letterSpacing:2.5,textTransform:"uppercase",color:color||C.textLt,margin:"0 0 6px"}}>{children}</p>;}
    function Nav({left,center,right}){return <div style={{background:C.surface,borderBottom:`1px solid ${C.border}`,padding:"12px 24px",display:"flex",justifyContent:"space-between",alignItems:"center",position:"sticky",top:0,zIndex:10}}><div>{left}</div><div style={{fontFamily:mono,fontSize:10,letterSpacing:2,textTransform:"uppercase",color:C.textLt}}>{center}</div><div style={{display:"flex",gap:8,alignItems:"center"}}>{right}</div></div>;}

    function MultiToggle({label,options,value,onChange,colorFn}){
      const isAll=value.length===0,toggle=v=>onChange(value.includes(v)?value.filter(x=>x!==v):[...value,v]);
      const TBtn=({active,onClick,label:lbl,color,bg})=><button onClick={onClick} style={{fontFamily:font,fontSize:12,fontWeight:active?600:400,padding:"7px 14px",cursor:"pointer",borderRadius:6,border:`1.5px solid ${active?(color||C.accent):C.border}`,background:active?(bg||C.accentBg):"transparent",color:active?(color||C.accent):C.textMed,display:"flex",alignItems:"center",gap:5}}>{active&&<span style={{fontSize:10}}>✓</span>}{lbl}</button>;
      return <div><Lbl>{label}</Lbl><div style={{display:"flex",flexWrap:"wrap",gap:8}}><TBtn active={isAll} onClick={()=>onChange([])} label="Tout" color={C.accent} bg={C.accentBg}/>{options.map(o=>{const col=colorFn?colorFn(o.value):C.accent,bg2=col===C.prio?C.prioBg:col===C.imp?C.impBg:col===C.util?C.utilBg:C.accentBg;return<TBtn key={o.value} active={value.includes(o.value)} onClick={()=>toggle(o.value)} label={o.label} color={col} bg={bg2}/>;})}</div><p style={{fontSize:11,color:C.textLt,margin:"8px 0 0"}}>{isAll?"Toutes les options incluses":`${value.length} sélectionnée${value.length>1?"s":""}`}</p></div>;
    }

    function ClassSelector({label,options,value,onChange,columns="auto"}){
      return <div><Lbl>{label}</Lbl><div style={{display:"grid",gridTemplateColumns:columns==="auto"?"repeat(auto-fill,minmax(140px,1fr))":`repeat(${columns},1fr)`,gap:8,marginTop:8}}>{options.map(opt=>{const active=value===opt.value,col=opt.color||C.accent,bg=opt.bg||C.accentBg;return<button key={String(opt.value)} onClick={()=>onChange(opt.value)} style={{fontFamily:font,fontSize:12,fontWeight:active?600:400,padding:"10px 12px",cursor:"pointer",borderRadius:8,border:`2px solid ${active?col:C.border}`,background:active?bg:C.surface,color:active?col:C.textMed,textAlign:"left",lineHeight:1.4}} onMouseEnter={e=>{if(!active)e.currentTarget.style.borderColor=col;}} onMouseLeave={e=>{if(!active)e.currentTarget.style.borderColor=C.border;}}>{active&&<span style={{marginRight:6}}>✓</span>}{opt.label}</button>;})}</div></div>;
    }

    // ─── Login ───────────────────────────────────────────────────────────────
    function LoginView({onLogin,onShowLanding,onRegister}){
      const [username,setUsername]=useState(""),[password,setPassword]=useState(""),[error,setError]=useState(""),[loading,setLoading]=useState(false);
      const handleSubmit=()=>{if(!username.trim()||!password.trim()){setError("Veuillez remplir tous les champs.");return;}setLoading(true);setError("");setTimeout(()=>{const ok=onLogin(username.trim(),password);if(!ok)setError("Identifiant ou mot de passe incorrect.");setLoading(false);},400);};
      return <div style={{fontFamily:font,background:C.bg,minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24}}>
        <div style={{width:"100%",maxWidth:380}}>
          <div style={{textAlign:"center",marginBottom:40}}>
            <p style={{fontFamily:serif,fontSize:34,letterSpacing:-1,margin:"0 0 6px"}}>Memorix</p>
            <p style={{fontFamily:mono,fontSize:9,letterSpacing:3,textTransform:"uppercase",color:C.textLt,margin:0}}>Sciences du vivant</p>
          </div>
          <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:12,padding:"32px 28px",boxShadow:"0 4px 24px rgba(0,0,0,0.06)"}}>
            <p style={{fontFamily:serif,fontSize:22,margin:"0 0 24px"}}>Connexion</p>
            <div style={{display:"flex",flexDirection:"column",gap:20}}>
              <div><Lbl>Identifiant</Lbl><input style={iLine} placeholder="Votre identifiant" value={username} onChange={e=>setUsername(e.target.value)} onKeyDown={e=>e.key==="Enter"&&handleSubmit()} autoFocus/></div>
              <div><Lbl>Mot de passe</Lbl><input style={iLine} type="password" placeholder="••••••••" value={password} onChange={e=>setPassword(e.target.value)} onKeyDown={e=>e.key==="Enter"&&handleSubmit()}/></div>
            </div>
            {error&&<p style={{fontSize:12,color:C.again,margin:"14px 0 0",background:C.againBg,padding:"8px 12px",borderRadius:6}}>{error}</p>}
            <Btn fill full style={{marginTop:24,fontSize:14,padding:"12px"}} onClick={handleSubmit} disabled={loading}>{loading?"Connexion…":"Se connecter →"}</Btn>
            <div style={{borderTop:`1px solid ${C.border}`,marginTop:24,paddingTop:20,textAlign:"center"}}>
              <p style={{fontSize:13,color:C.textMed,margin:"0 0 12px"}}>Pas encore de compte ?</p>
              <Btn full onClick={onRegister} style={{borderColor:C.util,color:C.util}}>Créer un compte gratuit →</Btn>
            </div>
          </div>
          <button onClick={onShowLanding} style={{display:"block",margin:"20px auto 0",fontFamily:font,fontSize:13,background:"none",border:"none",color:C.textLt,cursor:"pointer",textDecoration:"underline"}}>Voir les offres et tarifs</button>
        </div>
      </div>;
    }

    // ─── Register ────────────────────────────────────────────────────────────
    function RegisterView({onRegister,onBack}){
      const [form,setForm]=useState({username:"",password:"",confirm:"",email:""});
      const [error,setError]=useState(""),[done,setDone]=useState(false),[loading,setLoading]=useState(false);
      const F=(k,label,ph,type="text")=><div><Lbl>{label}</Lbl><input style={iLine} type={type} placeholder={ph} value={form[k]} onChange={e=>setForm(p=>({...p,[k]:e.target.value}))}/></div>;
      const handleSubmit=()=>{
        const {username,password,confirm}=form;
        if(!username.trim()||!password.trim()){setError("Identifiant et mot de passe requis.");return;}
        if(username===ADMIN_USERNAME){setError("Ce nom d'utilisateur est réservé.");return;}
        if(username.length<3){setError("L'identifiant doit contenir au moins 3 caractères.");return;}
        if(password.length<6){setError("Le mot de passe doit contenir au moins 6 caractères.");return;}
        if(password!==confirm){setError("Les mots de passe ne correspondent pas.");return;}
        const accs=storage.get("mx6-accounts")||[];
        if(accs.find(a=>a.username===username)){setError("Cet identifiant est déjà utilisé.");return;}
        setLoading(true);
        setTimeout(()=>{
          const newAcc={username:username.trim(),password,email:form.email,planId:"prerentree",groups:[]};
          const updated=[...accs,newAcc];
          storage.set("mx6-accounts",updated);
          onRegister(newAcc);
          setDone(true);setLoading(false);
        },500);
      };
      if(done)return <div style={{fontFamily:font,background:C.bg,minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24}}>
        <div style={{width:"100%",maxWidth:380,textAlign:"center"}}>
          <p style={{fontSize:48,margin:"0 0 16px"}}>✓</p>
          <p style={{fontFamily:serif,fontSize:24,margin:"0 0 8px"}}>Compte créé !</p>
          <p style={{fontSize:14,color:C.textMed,margin:"0 0 8px",lineHeight:1.6}}>Bienvenue sur Memorix. Ton compte a accès à l'offre <strong>Pré-rentrée</strong>.</p>
          <p style={{fontSize:12,color:C.textLt,margin:"0 0 28px",lineHeight:1.6}}>Pour accéder aux semestres payants, contacte l'administrateur qui mettra à jour ton abonnement.</p>
          <Btn fill full onClick={onBack}>Se connecter →</Btn>
        </div>
      </div>;
      return <div style={{fontFamily:font,background:C.bg,minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24}}>
        <div style={{width:"100%",maxWidth:400}}>

    }

    // ─── Card Editor ─────────────────────────────────────────────────────────
    function CardEditor({card,onSave,onCancel}){
      const isNew=!card?.id;
      const [form,setForm]=useState({front:card?.front||"",back:card?.back||"",groupId:card?.groupId||GROUPS[0].id,num:card?.num||1,packetId:card?.packetId||"prioritaire"});
      const [saved,setSaved]=useState(false),[errors,setErrors]=useState({});
      const validate=()=>{const e={};if(!form.front.trim())e.front=true;if(!form.back.trim())e.back=true;setErrors(e);return!Object.keys(e).length;};
      const handleSave=()=>{if(!validate())return;onSave({...form,id:card?.id||`card-${Date.now()}`});setSaved(true);};
      const selGroup=GROUPS.find(g=>g.id===form.groupId),availNums=selGroup?.nums||[1],selPacket=PACKETS.find(p=>p.id===form.packetId);
      const handleGroupChange=v=>{const g=GROUPS.find(g=>g.id===v);const newNum=g?.nums.includes(form.num)?form.num:g?.nums[0]||1;setForm(p=>({...p,groupId:v,num:newNum}));};
      return <div style={{fontFamily:font,background:C.bg,minHeight:"100vh"}}>
        <Nav left={<button onClick={onCancel} style={{fontFamily:font,fontSize:13,background:"none",border:"none",cursor:"pointer",color:C.textMed}}>← Retour</button>} center={isNew?"Nouvelle flashcard":"Modifier"} right={<Btn fill onClick={handleSave}>{saved?"✓ Enregistré":isNew?"Créer":"Mettre à jour"}</Btn>}/>
        <div style={{maxWidth:760,margin:"0 auto",padding:"28px 24px"}}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:20}}>
            <div style={{display:"flex",flexDirection:"column",gap:16}}>
              <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:10,padding:"20px"}}>
                <p style={{fontFamily:serif,fontSize:16,margin:"0 0 16px"}}>Contenu</p>
                <div style={{marginBottom:14}}><Lbl color={errors.front?C.again:undefined}>Recto{errors.front?" (requis)":""}</Lbl><textarea style={{...iBox,minHeight:90,marginTop:6,display:"block",borderColor:errors.front?C.again:C.border}} value={form.front} onChange={e=>{setForm(p=>({...p,front:e.target.value}));setErrors(er=>({...er,front:false}));}} placeholder="La question..." rows={3}/></div>
                <div><Lbl color={errors.back?C.again:undefined}>Verso{errors.back?" (requis)":""}</Lbl><textarea style={{...iBox,minHeight:110,marginTop:6,display:"block",borderColor:errors.back?C.again:C.border}} value={form.back} onChange={e=>{setForm(p=>({...p,back:e.target.value}));setErrors(er=>({...er,back:false}));}} placeholder="La réponse..." rows={4}/></div>
              </div>
              <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:10,padding:"14px 16px"}}>
                <Lbl>Aperçu</Lbl>
                <div style={{display:"flex",flexWrap:"wrap",gap:6,margin:"8px 0 0"}}><Tag color={pC(form.packetId)} bg={pB(form.packetId)}>{selPacket?.label}</Tag><Tag color={C.accent} bg={C.accentBg}>{selGroup?.label}</Tag><Tag color={C.textMed} bg={C.bg}>Cours {form.num}</Tag></div>
                {form.front&&<p style={{fontFamily:serif,fontSize:13,color:C.textMed,margin:"10px 0 0",lineHeight:1.5}}>{form.front.slice(0,100)}{form.front.length>100?"…":""}</p>}
              </div>
              <div style={{display:"flex",gap:10}}><Btn fill full onClick={handleSave}>{saved?"✓":isNew?"Créer la carte":"Mettre à jour"}</Btn><Btn full onClick={onCancel}>Annuler</Btn></div>
            </div>
            <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:10,padding:"20px",height:"fit-content"}}>
              <p style={{fontFamily:serif,fontSize:16,margin:"0 0 20px"}}>Classification</p>
              <div style={{display:"flex",flexDirection:"column",gap:20}}>
                <ClassSelector label="Matière" value={form.groupId} onChange={handleGroupChange} options={GROUPS.map(g=>({value:g.id,label:g.label}))}/>
                <div style={{borderTop:`1px solid ${C.border}`,paddingTop:18}}><ClassSelector label="Cours" value={form.num} onChange={v=>setForm(p=>({...p,num:v}))} options={availNums.map(n=>({value:n,label:`Cours ${n}`}))} columns={Math.min(availNums.length,4)}/></div>
                <div style={{borderTop:`1px solid ${C.border}`,paddingTop:18}}><ClassSelector label="Paquet" value={form.packetId} onChange={v=>setForm(p=>({...p,packetId:v}))} options={PACKETS.map(pk=>({value:pk.id,label:pk.label,color:pC(pk.id),bg:pB(pk.id)}))} columns={1}/></div>
              </div>
            </div>
          </div>
        </div>
      </div>;
    }

    // ─── Admin Cards list ────────────────────────────────────────────────────
    function AdminCards({cards,onNew,onEdit,onDelete}){
      const [fg,setFg]=useState("all"),[fn,setFn]=useState("all"),[fp,setFp]=useState("all"),[s,setS]=useState(""),[delId,setDelId]=useState(null);
      const filtered=useMemo(()=>cards.filter(c=>(fg==="all"||c.groupId===fg)&&(fn==="all"||c.num===fn)&&(fp==="all"||c.packetId===fp)&&(!s||`${c.front} ${c.back}`.toLowerCase().includes(s.toLowerCase()))),[cards,fg,fn,fp,s]);
      const FB=({active,onClick,children,color,bg})=><button onClick={onClick} style={{fontFamily:font,fontSize:11,fontWeight:active?600:400,padding:"5px 12px",cursor:"pointer",borderRadius:20,border:`1.5px solid ${active?(color||C.accent):C.border}`,background:active?(bg||C.accentBg):"transparent",color:active?(color||C.accent):C.textMed,whiteSpace:"nowrap"}}>{children}</button>;

        <div style={{position:"relative",marginBottom:14}}><span style={{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)",color:C.textLt,fontSize:16}}>⌕</span><input style={{...iBox,paddingLeft:36,borderRadius:8}} placeholder="Rechercher…" value={s} onChange={e=>setS(e.target.value)}/>{s&&<button onClick={()=>setS("")} style={{position:"absolute",right:12,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",cursor:"pointer",color:C.textLt,fontSize:16}}>×</button>}</div>
        <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:10,padding:"12px 16px",marginBottom:14}}>
          <div style={{display:"flex",flexWrap:"wrap",gap:12}}>
            <div><Lbl>Matière</Lbl><div style={{display:"flex",flexWrap:"wrap",gap:5,marginTop:5}}><FB active={fg==="all"} onClick={()=>setFg("all")}>Toutes</FB>{GROUPS.map(g=><FB key={g.id} active={fg===g.id} onClick={()=>setFg(g.id)}>{g.label.split(" ")[0]}…</FB>)}</div></div>
            <div><Lbl>Cours</Lbl><div style={{display:"flex",gap:5,marginTop:5}}><FB active={fn==="all"} onClick={()=>setFn("all")}>Tous</FB>{[1,2,3,4].map(n=><FB key={n} active={fn===n} onClick={()=>setFn(n)}>{n}</FB>)}</div></div>
            <div><Lbl>Paquet</Lbl><div style={{display:"flex",gap:5,marginTop:5}}><FB active={fp==="all"} onClick={()=>setFp("all")}>Tous</FB>{PACKETS.map(pk=><FB key={pk.id} active={fp===pk.id} onClick={()=>setFp(pk.id)} color={pC(pk.id)} bg={pB(pk.id)}>{pk.label}</FB>)}</div></div>
          </div>
        </div>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:10}}><p style={{fontSize:13,color:C.textMed,margin:0}}><strong style={{color:C.text}}>{filtered.length}</strong> carte{filtered.length!==1?"s":""}</p>{(fg!=="all"||fn!=="all"||fp!=="all"||s)&&<button onClick={()=>{setFg("all");setFn("all");setFp("all");setS("");}} style={{fontFamily:font,fontSize:12,background:"none",border:"none",cursor:"pointer",color:C.textLt}}>✕ Effacer</button>}</div>
        {filtered.length===0?(<div style={{border:`1.5px dashed ${C.border}`,borderRadius:10,padding:"48px 24px",textAlign:"center"}}><p style={{fontSize:14,color:C.textLt,margin:"0 0 16px"}}>{cards.length===0?"Aucune carte.":"Aucune correspondance."}</p>{cards.length===0&&<Btn onClick={onNew}>Créer la première carte →</Btn>}</div>):(
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {filtered.map(card=>{const grp=GROUPS.find(g=>g.id===card.groupId),col=pC(card.packetId),bg=pB(card.packetId);return(
              <div key={card.id} style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:8,overflow:"hidden",display:"flex"}}>
                <div style={{width:4,background:col,flexShrink:0}}/>
                <div style={{flex:1,padding:"12px 14px"}}>
                  <div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:6}}><Tag color={col} bg={bg} small>{PACKETS.find(p=>p.id===card.packetId)?.label}</Tag><Tag color={C.accent} bg={C.accentBg} small>{grp?.label}</Tag><Tag color={C.textMed} bg={C.bg} small>Cours {card.num}</Tag></div>
                  <p style={{fontFamily:serif,fontSize:14,color:C.text,margin:"0 0 3px",lineHeight:1.5}}>{card.front}</p>
                  <p style={{fontSize:12,color:C.textLt,margin:0,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{card.back}</p>
                  <div style={{display:"flex",gap:8,marginTop:10}}><Btn small onClick={()=>onEdit(card)}>✏ Modifier / Reclasser</Btn><Btn small danger onClick={()=>setDelId(card.id)}>Supprimer</Btn></div>
                </div>
              </div>);
            })}
          </div>
        )}
        {delId&&<Modal onClose={()=>setDelId(null)} width={320}><p style={{fontFamily:serif,fontSize:20,margin:"0 0 8px"}}>Supprimer ?</p><p style={{fontSize:13,color:C.textMed,margin:"0 0 24px"}}>Action irréversible.</p><div style={{display:"flex",gap:10}}><Btn fill danger onClick={()=>{onDelete(delId);setDelId(null);}}>Supprimer</Btn><Btn onClick={()=>setDelId(null)}>Annuler</Btn></div></Modal>}

    // ─── Admin Users ─────────────────────────────────────────────────────────
    function AdminUsers({accounts,onSave,onDelete}){
      const [editor,setEditor]=useState(null),[form,setForm]=useState({username:"",password:"",planId:"sem1"}),[err,setErr]=useState(""),[delUser,setDelUser]=useState(null);
      const openNew=()=>{setEditor("new");setForm({username:"",password:"",planId:"sem1"});setErr("");};
      const openEdit=a=>{setEditor(a.username);setForm({username:a.username,password:a.password,planId:a.planId});setErr("");};
      const handleSave=()=>{
        if(!form.username.trim()||!form.password.trim()){setErr("Identifiant et mot de passe requis.");return;}
        if(form.username===ADMIN_USERNAME){setErr("Ce nom est réservé.");return;}
        if(editor==="new"&&accounts.find(a=>a.username===form.username)){setErr("Cet identifiant existe déjà.");return;}
        const plan=PLANS.find(p=>p.id===form.planId);
        onSave({username:form.username,password:form.password,planId:form.planId,groups:plan?.groups||[]});
        setEditor(null);
      };
      const mainPlans=PLANS.slice(0,4);
      return <div style={{maxWidth:700,margin:"0 auto",padding:24}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}><p style={{fontFamily:serif,fontSize:18,margin:0}}>Comptes étudiants</p><Btn fill onClick={openNew}>+ Nouvel étudiant</Btn></div>
        {accounts.length===0?(<div style={{border:`1.5px dashed ${C.border}`,borderRadius:10,padding:"48px 24px",textAlign:"center"}}><p style={{fontSize:14,color:C.textLt,margin:"0 0 16px"}}>Aucun étudiant inscrit.</p><Btn onClick={openNew}>Créer le premier compte →</Btn></div>):(
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {accounts.map(a=>{const plan=PLANS.find(p=>p.id===a.planId);return(
              <div key={a.username} style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:8,padding:"14px 18px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div><p style={{fontFamily:mono,fontSize:14,margin:"0 0 4px",color:C.text}}>@{a.username}</p><div style={{display:"flex",gap:6}}><Tag color={C.accent} bg={C.accentBg} small>{plan?.label||a.planId}</Tag><Tag color={C.textMed} bg={C.bg} small>{plan?.price||"—"}</Tag></div></div>
                <div style={{display:"flex",gap:8}}><Btn small onClick={()=>openEdit(a)}>Modifier</Btn><Btn small danger onClick={()=>setDelUser(a.username)}>Supprimer</Btn></div>
              </div>);
            })}
          </div>

        <div style={{marginTop:16,padding:"12px 16px",borderRadius:8,background:C.accentBg,border:`1px solid ${C.accent}30`}}><p style={{fontSize:11,color:C.accent,margin:0,lineHeight:1.7}}>⚠ Les comptes sont stockés dans ce navigateur (localStorage). Pour un accès multi-appareils, un backend sera nécessaire.</p></div>

          <p style={{fontFamily:serif,fontSize:20,margin:"0 0 20px"}}>{editor==="new"?"Nouvel étudiant":"Modifier"}</p>
          <div style={{display:"flex",flexDirection:"column",gap:18}}>
            <div><Lbl>Identifiant</Lbl><input style={iLine} placeholder="ex: marie.dupont" value={form.username} onChange={e=>setForm(p=>({...p,username:e.target.value}))} disabled={editor!=="new"}/></div>
            <div><Lbl>Mot de passe</Lbl><input style={iLine} type="text" placeholder="Mot de passe" value={form.password} onChange={e=>setForm(p=>({...p,password:e.target.value}))}/></div>
            <div><Lbl>Abonnement</Lbl><div style={{display:"flex",flexDirection:"column",gap:6,marginTop:8}}>{mainPlans.map(o=><button key={o.id} onClick={()=>setForm(p=>({...p,planId:o.id}))} style={{fontFamily:font,fontSize:13,padding:"10px 14px",cursor:"pointer",borderRadius:6,border:`1.5px solid ${form.planId===o.id?C.accent:C.border}`,background:form.planId===o.id?C.accentBg:"transparent",color:form.planId===o.id?C.accent:C.textMed,textAlign:"left"}}>{form.planId===o.id&&"✓ "}{o.label} — {o.price}</button>)}</div></div>
          </div>
          {err&&<p style={{fontSize:12,color:C.again,background:C.againBg,padding:"8px 12px",borderRadius:6,margin:"14px 0 0"}}>{err}</p>}
          <div style={{display:"flex",gap:10,marginTop:24}}><Btn fill onClick={handleSave}>{editor==="new"?"Créer":"Mettre à jour"}</Btn><Btn onClick={()=>setEditor(null)}>Annuler</Btn></div>
        </Modal>}
        {delUser&&<Modal onClose={()=>setDelUser(null)} width={320}><p style={{fontFamily:serif,fontSize:20,margin:"0 0 8px"}}>Supprimer @{delUser} ?</p><p style={{fontSize:13,color:C.textMed,margin:"0 0 24px"}}>L'étudiant ne pourra plus se connecter.</p><div style={{display:"flex",gap:10}}><Btn fill danger onClick={()=>{onDelete(delUser);setDelUser(null);}}>Supprimer</Btn><Btn onClick={()=>setDelUser(null)}>Annuler</Btn></div></Modal>}
      </div>;

    // ─── Admin ───────────────────────────────────────────────────────────────
    function AdminView({cards,accounts,onSaveCard,onDeleteCard,onSaveUser,onDeleteUser,onBack}){
      const [tab,setTab]=useState("cards"),[subView,setSubView]=useState("list"),[editCard,setEditCard]=useState(null);
      const handleSave=cd=>{onSaveCard(cd);setTimeout(()=>setSubView("list"),700);};
      const TB=({id,label})=><button onClick={()=>setTab(id)} style={{fontFamily:font,fontSize:12,fontWeight:500,padding:"8px 18px",cursor:"pointer",border:"none",borderBottom:`2px solid ${tab===id?C.accent:"transparent"}`,background:"transparent",color:tab===id?C.accent:C.textMed}}>{label}</button>;

        <div style={{borderBottom:`1px solid ${C.border}`,background:C.surface,padding:"0 24px",display:"flex",gap:0}}><TB id="cards" label="📚 Flashcards"/><TB id="users" label="👤 Étudiants"/></div>

    // ─── Dashboard ───────────────────────────────────────────────────────────
    function Dashboard({currentUser,cards,progress,settings,onStudy,onGlobalStudy,onAdmin,onSettings,onLogout}){
      const isAdmin=currentUser.role==="admin";
      const ids=currentUser.plan?.groups||[];
      const accessible=GROUPS.filter(g=>ids.includes(g.id));

      function PktBtn({gid,num,pk}){const {total,due}=packetStats(cards,progress,gid,num,pk.id);const col=pC(pk.id),bg=pB(pk.id),hasDue=due>0,upToDate=total>0&&!hasDue;return <button onClick={()=>total>0&&onStudy(gid,num,pk.id)} style={{fontFamily:font,fontSize:11,fontWeight:500,padding:"7px 12px",cursor:total>0?"pointer":"default",borderRadius:6,border:`1.5px solid ${hasDue?col:upToDate?C.border:"#e8e5e0"}`,background:hasDue?bg:C.surface,color:hasDue?col:upToDate?C.textLt:"#c0bbb5",display:"flex",flexDirection:"column",alignItems:"center",gap:3,minWidth:90}} onMouseEnter={e=>{if(total>0)e.currentTarget.style.borderColor=col;}} onMouseLeave={e=>{e.currentTarget.style.borderColor=hasDue?col:upToDate?C.border:"#e8e5e0";}}><span>{pk.label}</span><span style={{fontSize:10,fontWeight:400}}>{total===0?"vide":hasDue?`${due} carte${due>1?"s":""}` :"✓ à jour"}</span></button>;}
      function GroupBlock({group}){return <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:10,overflow:"hidden",marginBottom:12}}><div style={{padding:"11px 18px",borderBottom:`1px solid ${C.border}`,background:C.bg}}><p style={{fontFamily:serif,fontSize:15,margin:0}}>{group.label}</p></div>{group.nums.map((n,i)=><div key={n} style={{display:"flex",alignItems:"center",padding:"10px 18px",gap:14,borderBottom:i<group.nums.length-1?`1px solid ${C.border}`:"none"}}><span style={{fontFamily:mono,fontSize:9,letterSpacing:2,color:C.textLt,minWidth:52,textTransform:"uppercase"}}>Cours {n}</span><div style={{display:"flex",gap:8,flexWrap:"wrap"}}>{PACKETS.map(pk=><PktBtn key={pk.id} gid={group.id} num={n} pk={pk}/>)}</div></div>)}</div>;}
      return <div style={{fontFamily:font,background:C.bg,minHeight:"100vh",color:C.text}}>
        <Nav left={<span style={{fontFamily:serif,fontSize:20}}>Memorix</span>} center="Tableau de bord" right={<><Btn small onClick={onSettings}>Paramètres</Btn>{isAdmin&&<Btn small onClick={onAdmin}>Admin</Btn>}<button onClick={onLogout} style={{fontFamily:font,fontSize:12,background:"none",border:"none",color:C.textLt,cursor:"pointer"}}>Déconnexion</button></>}/>
        <div style={{maxWidth:760,margin:"0 auto",padding:"28px 24px"}}>
          <p style={{fontSize:13,color:C.textMed,margin:"0 0 20px"}}>Bonjour <strong style={{color:C.text}}>@{currentUser.username}</strong> ✦ {PLANS.find(p=>p.id===currentUser.plan?.planId)?.label||"Accès personnalisé"}</p>
          <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:12,padding:"20px 22px",marginBottom:24}}>
            <p style={{fontFamily:serif,fontSize:18,margin:"0 0 3px"}}>Révision globale</p>
            <p style={{fontSize:12,color:C.textMed,margin:"0 0 16px"}}>Toutes vos matières en une session</p>
            <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10}}>{gModes.map(mode=>{const count=globalDue(cards,progress,ids,settings,mode.id),hasCards=count>0;return <button key={String(mode.id)} onClick={()=>hasCards&&onGlobalStudy(mode.id)} style={{fontFamily:font,padding:"14px 10px",cursor:hasCards?"pointer":"default",borderRadius:8,border:`1.5px solid ${hasCards?mode.col:C.border}`,background:hasCards?mode.bg:"transparent",color:hasCards?mode.col:C.textLt,display:"flex",flexDirection:"column",alignItems:"center",gap:6}} onMouseEnter={e=>{if(hasCards)e.currentTarget.style.transform="translateY(-2px)";}} onMouseLeave={e=>{e.currentTarget.style.transform="none";}}><span style={{fontSize:11,fontWeight:600,textAlign:"center",lineHeight:1.3}}>{mode.label}</span><span style={{fontSize:18,fontWeight:300}}>{count}</span><span style={{fontSize:10,opacity:0.7}}>carte{count!==1?"s":""}</span></button>;})}</div>
          </div>
          <p style={{fontFamily:serif,fontSize:18,margin:"0 0 14px"}}>Par matière et cours</p>
          {sem1.length>0&&<><p style={{fontFamily:mono,fontSize:9,letterSpacing:3,textTransform:"uppercase",color:C.textLt,margin:"0 0 12px"}}>— Semestre 1</p>{sem1.map(g=><GroupBlock key={g.id} group={g}/>)}</>}
          {sem2.length>0&&<><p style={{fontFamily:mono,fontSize:9,letterSpacing:3,textTransform:"uppercase",color:C.textLt,margin:"16px 0 12px"}}>— Semestre 2</p>{sem2.map(g=><GroupBlock key={g.id} group={g}/>)}</>}
          {!sem1.length&&!sem2.length&&<div style={{border:`1.5px dashed ${C.border}`,borderRadius:10,padding:"40px 24px",textAlign:"center"}}><p style={{fontSize:14,color:C.textLt}}>Aucune matière dans votre abonnement.</p></div>}
        </div>
      </div>;
    }

    // ─── Study ───────────────────────────────────────────────────────────────
    function StudyView({label,queue,onRate,onBack,settings,isAdmin}){
      const [idx,setIdx]=useState(0),[showBack,setShowBack]=useState(false),[localQ,setLocalQ]=useState(queue),[done,setDone]=useState(false),[stats,setStats]=useState({correct:0,total:0});
      const card=localQ[idx];
      const handleRate=async rating=>{
        setStats(s=>({total:s.total+1,correct:s.correct+(rating>=3?1:0)}));
        const np=await onRate(card,rating);
        const q=[...localQ];
        if(np.state==="learning"||np.state==="relearning"){q.splice(idx,1);q.splice(Math.min(idx+4,q.length),0,card);}else q.splice(idx,1);
        setLocalQ(q);if(!q.length||idx>=q.length){setDone(true);return;}setShowBack(false);
      };
      if(done||!card)return <div style={{fontFamily:font,background:C.bg,minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:12}}><div style={{fontSize:52}}>✓</div><p style={{fontFamily:serif,fontSize:26,margin:0}}>Session terminée</p><p style={{fontSize:14,color:C.textMed}}>{stats.correct}/{stats.total} · {stats.total>0?Math.round((stats.correct/stats.total)*100):0}%</p><Btn fill style={{marginTop:20}} onClick={onBack}>← Tableau de bord</Btn></div>;
      const col=pC(card.packetId),grp=GROUPS.find(g=>g.id===card.groupId);
      return <div style={{fontFamily:font,background:C.bg,minHeight:"100vh",color:C.text}}>
        <Nav left={<button onClick={onBack} style={{fontFamily:font,fontSize:13,background:"none",border:"none",cursor:"pointer",color:C.textMed}}>← Retour</button>} center={label} right={<span style={{fontSize:12,color:C.textLt}}>{idx+1} / {localQ.length}</span>}/>
        <div style={{height:3,background:C.border}}><div style={{height:3,background:col,width:`${(idx/Math.max(1,localQ.length))*100}%`,transition:"width 0.3s"}}/></div>
        <div style={{maxWidth:560,margin:"0 auto",padding:"28px 24px 0"}}>
          <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:18}}>
            <Tag color={col} bg={pB(card.packetId)}>{PACKETS.find(p=>p.id===card.packetId)?.label}</Tag>
            <Tag color={C.accent} bg={C.accentBg}>{grp?.label}</Tag>
            <Tag color={C.textMed} bg={C.bg}>Cours {card.num}</Tag>
            <Tag color={C.textLt} bg={C.bg}>{stateLabel(null)}</Tag>
          </div>
          <div style={{perspective:1200,height:260,marginBottom:22}}>
            <div style={{width:"100%",height:"100%",position:"relative",transformStyle:"preserve-3d",transform:showBack?"rotateY(180deg)":"rotateY(0)",transition:"transform 0.4s cubic-bezier(0.4,0,0.2,1)",cursor:showBack?"default":"pointer"}} onClick={()=>!showBack&&setShowBack(true)}>
              <div style={{position:"absolute",inset:0,backfaceVisibility:"hidden",background:C.surface,borderRadius:12,border:`1.5px solid ${C.border}`,padding:"28px 32px",display:"flex",flexDirection:"column",justifyContent:"center"}}>
                <Lbl>Question</Lbl>
                <p style={{fontFamily:serif,fontSize:20,lineHeight:1.6,margin:"8px 0 0",...(!isAdmin?noSel:{})}} onContextMenu={!isAdmin?e=>e.preventDefault():undefined}>{card.front}</p>
                <p style={{fontSize:12,color:C.textLt,position:"absolute",bottom:16,right:22}}>Cliquez pour révéler →</p>
              </div>
              <div style={{position:"absolute",inset:0,backfaceVisibility:"hidden",background:C.surface,borderRadius:12,border:`1.5px solid ${col}`,padding:"28px 32px",display:"flex",flexDirection:"column",justifyContent:"center",transform:"rotateY(180deg)"}}>
                <Lbl>Réponse</Lbl>
                <p style={{fontSize:15,lineHeight:1.8,margin:"8px 0 0",color:C.textMed,...(!isAdmin?noSel:{})}} onContextMenu={!isAdmin?e=>e.preventDefault():undefined}>{card.back}</p>
              </div>
            </div>
          </div>
          {showBack&&<div><Lbl>Comment était-ce ?</Lbl><div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10,marginTop:10}}>{[[1,"À revoir",C.again,C.againBg],[2,"Difficile",C.hard,C.hardBg],[3,"Bien",C.good,C.goodBg],[4,"Facile",C.easy,C.easyBg]].map(([r,lbl,btnCol,btnBg])=><button key={r} onClick={()=>handleRate(r)} style={{fontFamily:font,padding:"14px 8px",cursor:"pointer",borderRadius:8,border:`1.5px solid ${btnCol}`,background:btnBg,color:btnCol,display:"flex",flexDirection:"column",alignItems:"center",gap:6}} onMouseEnter={e=>{e.currentTarget.style.transform="translateY(-2px)";}} onMouseLeave={e=>{e.currentTarget.style.transform="none";}}><span style={{fontSize:12,fontWeight:600}}>{lbl}</span><span style={{fontSize:14,fontWeight:700}}>{getIntervalLabel(null,r,settings)}</span></button>)}</div></div>}
        </div>
      </div>;
    }

    // ─── Settings ────────────────────────────────────────────────────────────
    function SettingsView({settings,onSave,onBack}){
      const [s,setS]=useState(settings),[saved,setSaved]=useState(false);
      const save=()=>{onSave(s);setSaved(true);setTimeout(()=>setSaved(false),2000);};
      const Sl=({k,label,desc,min,max,step,unit})=><div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:8,padding:"14px 16px"}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}><p style={{fontSize:13,fontWeight:500,margin:0}}>{label}</p><p style={{fontSize:18,fontWeight:300,color:C.accent,margin:0}}>{s[k]}<span style={{fontSize:11}}> {unit}</span></p></div><p style={{fontSize:11,color:C.textMed,margin:"0 0 8px"}}>{desc}</p><input type="range" min={min} max={max} step={step} value={s[k]} onChange={e=>setS(p=>({...p,[k]:Number(e.target.value)}))} style={{width:"100%"}}/></div>;
      const Sec=({title,children})=><div style={{marginBottom:24}}><h2 style={{fontFamily:serif,fontSize:19,fontWeight:400,margin:"0 0 12px",paddingBottom:8,borderBottom:`1px solid ${C.border}`}}>{title}</h2>{children}</div>;
      return <div style={{fontFamily:font,background:C.bg,minHeight:"100vh",color:C.text}}>
        <Nav left={<button onClick={onBack} style={{fontFamily:font,fontSize:13,background:"none",border:"none",cursor:"pointer",color:C.textMed}}>← Retour</button>} center="Paramètres" right={<Btn fill onClick={save}>{saved?"✓ Sauvegardé":"Sauvegarder"}</Btn>}/>
        <div style={{maxWidth:600,margin:"0 auto",padding:"28px 24px"}}>
          <Sec title="🎯 Nouvelles cartes du jour">
            <p style={{fontSize:13,color:C.textMed,margin:"0 0 14px",lineHeight:1.6}}>Choisissez quelles nouvelles cartes seront proposées aujourd'hui. Les révisions planifiées apparaissent toujours.</p>
            <div style={{display:"flex",flexDirection:"column",gap:10}}>
              <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:8,padding:"14px 16px"}}><MultiToggle label="Matières à découvrir" value={s.dailyGroups} onChange={v=>setS(p=>({...p,dailyGroups:v}))} options={GROUPS.map(g=>({value:g.id,label:g.label}))} colorFn={()=>C.accent}/></div>
              <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:8,padding:"14px 16px"}}><MultiToggle label="Paquets à découvrir" value={s.dailyPackets} onChange={v=>setS(p=>({...p,dailyPackets:v}))} options={PACKETS.map(pk=>({value:pk.id,label:pk.label}))} colorFn={pC}/></div>
            </div>
          </Sec>
          <Sec title="⏱ Intervalles d'apprentissage">
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              <Sl k="againMin" label="À revoir"  desc="Délai de réaffichage (min)."            min={1} max={10}  step={1}  unit="min"/>
              <Sl k="hardMin"  label="Difficile" desc="Délai pour une carte presque sue (min)." min={2} max={30}  step={1}  unit="min"/>
              <Sl k="goodMin"  label="Bien"      desc="Avant graduation vers révision (min)."   min={5} max={60}  step={5}  unit="min"/>
              <Sl k="easyDays" label="Facile"    desc="Graduation immédiate (jours)."           min={1} max={14}  step={1}  unit="jours"/>
            </div>
          </Sec>
          <Sec title="📚 Session d'étude">
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              <Sl k="newCardsPerDay"   label="Nouvelles cartes / jour" desc="Limite les cartes inédites quotidiennes." min={5}  max={100} step={5}  unit=""/>
              <Sl k="maxReviewsPerDay" label="Révisions max / session" desc="Plafond de cartes par session."           min={20} max={500} step={10} unit=""/>
            </div>
          </Sec>
          <Btn fill full style={{fontSize:14}} onClick={save}>{saved?"✓ Sauvegardé":"Sauvegarder tous les paramètres"}</Btn>
        </div>
      </div>;
    }

    // ─── Landing ─────────────────────────────────────────────────────────────
    function Landing({onBack,onRegister}){
      const [tab,setTab]=useState("semester"),[contactPlan,setContactPlan]=useState(null);
      const semPlans=PLANS.slice(0,4),grpPlans=PLANS.filter(p=>p.id.startsWith("g-")),display=tab==="semester"?semPlans:grpPlans;
      const ADMIN_EMAIL="votre-email@exemple.com"; // ← Remplace par ton email

      return <div style={{fontFamily:font,background:C.bg,minHeight:"100vh",color:C.text}}>
        <div style={{background:C.surface,borderBottom:`1px solid ${C.border}`,padding:"14px 32px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div style={{display:"flex",alignItems:"baseline",gap:12}}><span style={{fontFamily:serif,fontSize:22}}>Memorix</span><span style={{fontFamily:mono,fontSize:9,letterSpacing:2,color:C.textLt,textTransform:"uppercase"}}>Sciences du vivant</span></div>
          <div style={{display:"flex",gap:10}}><Btn onClick={onRegister} style={{borderColor:C.util,color:C.util}}>Créer un compte gratuit</Btn><Btn fill onClick={onBack}>Se connecter →</Btn></div>
        </div>

        <div style={{maxWidth:760,margin:"0 auto",padding:"56px 32px 40px"}}>
          <p style={{fontFamily:serif,fontSize:36,fontWeight:400,letterSpacing:-1,margin:"0 0 16px",lineHeight:1.1}}>Flashcards médicales intelligentes</p>
          <p style={{fontSize:15,lineHeight:1.8,color:C.textMed,maxWidth:420,margin:"0 0 32px"}}>Répétition espacée SM-2, paquets Prioritaire · Important · Utile, révision globale ou par matière.</p>
          <div style={{display:"flex",gap:8,marginBottom:20}}>
            {[["semester","Par semestre / année"],["subject","Par matière"]].map(([k,l])=><button key={k} onClick={()=>setTab(k)} style={{fontFamily:font,fontSize:13,fontWeight:500,padding:"7px 16px",cursor:"pointer",borderRadius:6,border:`1.5px solid ${tab===k?C.accent:C.border}`,background:tab===k?C.accentBg:"transparent",color:tab===k?C.accent:C.textMed}}>{l}</button>)}
          </div>
          <div style={{display:"grid",gridTemplateColumns:tab==="semester"?"repeat(4,1fr)":"repeat(3,1fr)",gap:10}}>
            {display.map(plan=>{
              const isFree=plan.price==="Gratuit";
              return <div key={plan.id} style={{background:C.surface,border:`1.5px solid ${isFree?C.util:C.border}`,borderRadius:10,padding:"20px 16px",display:"flex",flexDirection:"column"}}>
                {isFree&&<Tag color={C.util} bg={C.utilBg} small>Offert</Tag>}
                <p style={{fontFamily:serif,fontSize:15,margin:isFree?"8px 0 6px":"0 0 6px"}}>{plan.label}</p>
                <p style={{fontSize:11,color:C.textMed,margin:"0 0 12px",lineHeight:1.5,flex:1}}>{plan.desc}</p>
                <p style={{fontSize:isFree?18:24,fontWeight:300,margin:"0 0 14px",color:isFree?C.util:C.text}}>{plan.price}</p>
                {isFree
                  ? <button onClick={onRegister} style={{fontFamily:font,fontSize:11,fontWeight:600,padding:"8px 12px",cursor:"pointer",borderRadius:6,border:`1.5px solid ${C.util}`,background:C.utilBg,color:C.util}}>Créer un compte →</button>
                  : <button onClick={()=>setContactPlan(plan)} style={{fontFamily:font,fontSize:11,fontWeight:600,padding:"8px 12px",cursor:"pointer",borderRadius:6,border:`1.5px solid ${C.accent}`,background:C.accentBg,color:C.accent}}>Demander l'accès →</button>
                }
              </div>;
            })}
          </div>
          <p style={{fontSize:12,color:C.textLt,margin:"20px 0 0",textAlign:"center"}}>Crée d'abord un compte gratuit — l'administrateur activera ton accès après souscription.</p>
        </div>

        {contactPlan&&<Modal onClose={()=>setContactPlan(null)} width={420}>
          <p style={{fontFamily:serif,fontSize:22,margin:"0 0 4px"}}>Demander l'accès</p>
          <p style={{fontSize:14,color:C.textMed,margin:"0 0 24px"}}>{contactPlan.label} — {contactPlan.price}</p>
          <div style={{background:C.accentBg,border:`1px solid ${C.accent}30`,borderRadius:8,padding:"16px",marginBottom:20}}>
            <p style={{fontSize:13,color:C.textMed,margin:"0 0 8px",lineHeight:1.6}}>Pour accéder à cet abonnement :</p>
            <ol style={{fontSize:13,color:C.textMed,margin:0,paddingLeft:20,lineHeight:2}}>
              <li>Crée d'abord un <strong>compte gratuit</strong> sur cette page</li>
              <li>Contacte l'administrateur pour régler l'abonnement</li>
              <li>Ton accès sera activé sous 24h</li>
            </ol>
          </div>
          <Lbl>Contact administrateur</Lbl>
          <div style={{display:"flex",alignItems:"center",gap:10,marginTop:8}}>
            <code style={{fontFamily:mono,fontSize:13,background:C.bg,border:`1px solid ${C.border}`,borderRadius:6,padding:"8px 12px",flex:1}}>{ADMIN_EMAIL}</code>
            <Btn small onClick={()=>{navigator.clipboard?.writeText(ADMIN_EMAIL);alert("Email copié !");}}>Copier</Btn>
          </div>
          <div style={{display:"flex",gap:10,marginTop:20}}>
            <Btn fill full onClick={onRegister}>Créer mon compte gratuit →</Btn>
            <Btn onClick={()=>setContactPlan(null)}>Fermer</Btn>
          </div>
        </Modal>}
      </div>;
    }

    // ─── App ─────────────────────────────────────────────────────────────────
    function App(){
      const [view,setView]=useState("loading"),[currentUser,setCurrentUser]=useState(null),[cards,setCards]=useState([]),[prog,setProg]=useState({}),[settings,setSettings]=useState(DEFAULT_SETTINGS),[accounts,setAccounts]=useState([]),[studyCtx,setStudyCtx]=useState(null);

      // Chargement initial depuis Supabase
      useEffect(()=>{
        async function init(){
          const savedSet=storage.get("mx6-settings");
          if(savedSet) setSettings({...DEFAULT_SETTINGS,...savedSet});

          // Charger les cartes depuis Supabase
          const remoteCards = await supa.getCards();
          if(remoteCards && remoteCards.length>0){
            setCards(remoteCards);
          } else {
            // Première utilisation : pousser les cartes initiales vers Supabase
            for(const c of INITIAL_CARDS){ await supa.upsertCard(c); }
            setCards(INITIAL_CARDS);
          }

          // Charger les comptes depuis Supabase
          const remoteAccounts = await supa.getAccounts();
          setAccounts(remoteAccounts||[]);

          // Session locale
          const saved=storage.get("mx6-session");
          if(saved){
            const userProg=storage.get(`mx6-prog-${saved.username}`)||{};
            setProg(userProg); setCurrentUser(saved); setView("dashboard");
          } else { setView("login"); }
        }
        init();
      },[]);

      const handleLogin=(username,password)=>{
        if(username===ADMIN_USERNAME&&password===ADMIN_PASSWORD){
          const u={username:ADMIN_USERNAME,role:"admin",plan:{planId:"both",groups:ALL}};
          const p=storage.get(`mx6-prog-${username}`)||{};
          setProg(p);setCurrentUser(u);storage.set("mx6-session",u);setView("dashboard");return true;
        }
        const acc=accounts.find(a=>a.username===username&&a.password===password);
        if(acc){
          const u={username:acc.username,role:"student",plan:{planId:acc.plan_id||acc.planId,groups:acc.groups||[]}};
          const p=storage.get(`mx6-prog-${username}`)||{};
          setProg(p);setCurrentUser(u);storage.set("mx6-session",u);setView("dashboard");return true;
        }
        return false;
      };

      const logout=()=>{storage.del("mx6-session");setCurrentUser(null);setProg({});setView("login");};
      const saveProg=useCallback(p=>{setProg(p);if(currentUser)storage.set(`mx6-prog-${currentUser.username}`,p);},[currentUser]);
      const saveSet=useCallback(s=>{setSettings(s);storage.set("mx6-settings",s);},[]);

      // Cartes → Supabase (partagé avec tous)
      const handleSaveCard=useCallback(async cd=>{
        await supa.upsertCard(cd);
        setCards(prev=>prev.find(c=>c.id===cd.id)?prev.map(c=>c.id===cd.id?cd:c):[...prev,cd]);
      },[]);
      const handleDeleteCard=useCallback(async id=>{
        await supa.deleteCard(id);
        setCards(prev=>prev.filter(c=>c.id!==id));
      },[]);

      // Comptes → Supabase (partagé avec tous)
      const handleSaveUser=useCallback(async acc=>{
        await supa.upsertAccount(acc);
        setAccounts(prev=>prev.find(a=>a.username===acc.username)?prev.map(a=>a.username===acc.username?{...a,...acc,plan_id:acc.planId}:a):[...prev,{...acc,plan_id:acc.planId}]);
      },[]);
      const handleDeleteUser=useCallback(async username=>{
        await supa.deleteAccount(username);
        setAccounts(prev=>prev.filter(a=>a.username!==username));
      },[]);

      const handleRegister=useCallback(async newAcc=>{
        await supa.upsertAccount(newAcc);
        setAccounts(prev=>[...prev,{...newAcc,plan_id:newAcc.planId}]);
        const u={username:newAcc.username,role:"student",plan:{planId:newAcc.planId,groups:newAcc.groups}};
        setProg({});setCurrentUser(u);storage.set("mx6-session",u);
      },[]);

      const startStudy=useCallback((gid,num,pkId)=>{
        const list=filterCards(cards,gid,num,pkId);
        const queue=buildQueue(list,prog,settings);
        if(!queue.length){alert("Aucune carte à réviser !");return;}
        const grpLabel=GROUPS.find(g=>g.id===gid)?.label,pktLabel=PACKETS.find(p=>p.id===pkId)?.label;
        setStudyCtx({label:`${grpLabel} · Cours ${num} · ${pktLabel}`,queue});setView("study");
      },[cards,prog,settings]);

      const startGlobalStudy=useCallback(pkId=>{
        const ids=currentUser?.plan?.groups||[];
        const el=cards.filter(c=>ids.includes(c.groupId)&&(!pkId||c.packetId===pkId));
        const queue=buildQueue(el,prog,settings);
        if(!queue.length){alert("Aucune carte à réviser !");return;}
        setStudyCtx({label:pkId?`Révision globale · ${PACKETS.find(p=>p.id===pkId)?.label}`:"Révision globale · Toutes les cartes",queue});
        setView("study");
      },[cards,prog,currentUser,settings]);

      const handleRate=useCallback(async(card,rating)=>{
        const np=computeNext(prog[card.id],rating,settings);
        saveProg({...prog,[card.id]:np});return np;
      },[prog,saveProg,settings]);

      if(view==="loading")return(
        <div style={{fontFamily:font,background:C.bg,minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:16}}>
          <p style={{fontFamily:serif,fontSize:28,letterSpacing:-0.5}}>Memorix</p>
          <p style={{color:C.textLt,fontSize:13}}>Chargement des données…</p>
        </div>
      );
      if(view==="landing")  return <Landing onBack={()=>setView("login")} onRegister={()=>setView("register")}/>;
      if(view==="login")    return <LoginView onLogin={handleLogin} onShowLanding={()=>setView("landing")} onRegister={()=>setView("register")}/>;
      if(view==="register") return <RegisterView onRegister={acc=>{handleRegister(acc);setView("dashboard");}} onBack={()=>setView("login")}/>;
      if(view==="dashboard"&&currentUser) return <Dashboard currentUser={currentUser} cards={cards} progress={prog} settings={settings} onStudy={startStudy} onGlobalStudy={startGlobalStudy} onAdmin={()=>setView("admin")} onSettings={()=>setView("settings")} onLogout={logout}/>;
      if(view==="study"&&studyCtx) return <StudyView label={studyCtx.label} queue={studyCtx.queue} onRate={handleRate} onBack={()=>setView("dashboard")} settings={settings} isAdmin={currentUser?.role==="admin"}/>;
      if(view==="admin") return <AdminView cards={cards} accounts={accounts} onSaveCard={handleSaveCard} onDeleteCard={handleDeleteCard} onSaveUser={handleSaveUser} onDeleteUser={handleDeleteUser} onBack={()=>setView("dashboard")}/>;
      if(view==="settings") return <SettingsView settings={settings} onSave={saveSet} onBack={()=>setView("dashboard")}/>;
      return null;
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
